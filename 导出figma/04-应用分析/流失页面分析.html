<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流失页面分析 路 鏁版嵁鍚庡彴</title>
    <style>

      :root {
        /* Arco Design Tokens */
        --arco-primary: #165dff;
        --arco-primary-hover: #4080ff;
        --arco-primary-active: #0e42d2;
        --arco-primary-light: #e8f3ff;
        --arco-success: #00b42a;
        --arco-warning: #ff7d00;
        --arco-danger: #f53f3f;
        --arco-bg-1: #ffffff;
        --arco-bg-2: #f7f8fa;
        --arco-bg-3: #f2f3f5;
        --arco-border: #e5e6eb;
        --arco-border-2: #f2f3f5;
        --arco-text-1: #1d2129;
        --arco-text-2: #4e5969;
        --arco-text-3: #86909c;
        --arco-text-4: #c9cdd4;
        --arco-radius: 4px;
        --arco-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        --arco-shadow-light: 0 1px 2px rgba(0, 0, 0, 0.03);

        --sidebar-bg: var(--arco-bg-1);
        --sidebar-active: var(--arco-primary-light);
        --sidebar-active-text: var(--arco-primary);
        --sidebar-text: var(--arco-text-2);
        --sidebar-text-active: var(--arco-primary);
        --header-bg: var(--arco-bg-1);
        --page-bg: var(--arco-bg-2);
        --border: var(--arco-border);
        --primary: var(--arco-primary);
        --group-header: #e3ecff;
        --group-header-alt: var(--arco-bg-2);
        --text: var(--arco-text-1);
        --text-secondary: var(--arco-text-2);
        --danger: var(--arco-danger);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "PingFang SC",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Microsoft YaHei",
          Arial,
          sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--page-bg);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      /* 侧边栏 - Arco Pro 浅色导航 */
      .sidebar {
        width: 220px;
        background: var(--sidebar-bg);
        color: var(--sidebar-text);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        box-shadow: var(--arco-shadow-light);
      }

      .sidebar-logo {
        height: 60px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        gap: 10px;
      }

      .sidebar-logo-icon {
        width: 28px;
        height: 28px;
        background: var(--arco-primary);
        border-radius: var(--arco-radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        color: #fff;
        font-size: 12px;
      }

      .sidebar-logo-text {
        color: var(--arco-text-1);
        font-size: 16px;
        font-weight: 600;
      }

      .sidebar-menu {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .menu-group {
        margin-bottom: 2px;
      }

      .menu-top {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        height: 40px;
        color: var(--sidebar-text);
        cursor: pointer;
        transition: all 0.15s cubic-bezier(0.34, 0.69, 0.1, 1);
        border-radius: var(--arco-radius);
        user-select: none;
        font-weight: 400;
        font-size: 14px;
      }

      .menu-top:hover {
        color: var(--arco-text-1);
        background: var(--arco-bg-3);
      }

      .menu-top.active {
        color: var(--sidebar-active-text);
        background: var(--sidebar-active);
        font-weight: 500;
      }

      .menu-top.has-child.active:not(.expanded) {
        background: var(--sidebar-active);
        color: var(--sidebar-active-text);
        font-weight: 500;
      }

      .menu-arrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        height: 14px;
        margin-left: auto;
        font-size: 10px;
        color: var(--arco-text-3);
        transition:
          transform 0.2s cubic-bezier(0.34, 0.69, 0.1, 1),
          color 0.15s;
        flex-shrink: 0;
      }

      .menu-group.expanded .menu-arrow {
        transform: rotate(90deg);
        color: var(--arco-text-2);
      }

      .menu-top.active .menu-arrow {
        color: var(--arco-primary);
      }

      .submenu {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.25s cubic-bezier(0.34, 0.69, 0.1, 1),
          opacity 0.2s ease;
        opacity: 0;
      }

      .menu-group.expanded .submenu {
        max-height: 640px;
        opacity: 1;
      }

      .menu-child {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px 0 36px;
        height: 36px;
        color: var(--sidebar-text);
        cursor: pointer;
        transition: all 0.15s cubic-bezier(0.34, 0.69, 0.1, 1);
        border-radius: var(--arco-radius);
        user-select: none;
        font-size: 14px;
      }

      .menu-child:not(.has-child):hover {
        color: var(--arco-text-1);
        background: var(--arco-bg-3);
      }

      .menu-child.active {
        color: var(--sidebar-active-text);
        background: var(--sidebar-active);
        font-weight: 500;
      }

      .menu-child.has-child.active:not(.expanded) {
        background: var(--sidebar-active);
        color: var(--sidebar-active-text);
        font-weight: 500;
      }

      .menu-child .menu-arrow {
        width: 12px;
        height: 12px;
        font-size: 9px;
      }

      .menu-sub-group.expanded > .menu-child .menu-arrow {
        transform: rotate(90deg);
        color: var(--arco-text-2);
      }

      .submenu-inner {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.25s cubic-bezier(0.34, 0.69, 0.1, 1),
          opacity 0.2s ease;
        opacity: 0;
      }

      .menu-sub-group.expanded .submenu-inner {
        max-height: 280px;
        opacity: 1;
      }

      .menu-grandchild {
        display: block;
        padding: 0 12px 0 52px;
        height: 36px;
        line-height: 36px;
        color: var(--sidebar-text);
        cursor: pointer;
        transition: all 0.15s cubic-bezier(0.34, 0.69, 0.1, 1);
        border-radius: var(--arco-radius);
        user-select: none;
        font-size: 14px;
      }

      .menu-grandchild:hover {
        color: var(--arco-text-1);
        background: var(--arco-bg-3);
      }

      .menu-grandchild.active {
        color: var(--sidebar-active-text);
        background: var(--sidebar-active);
        font-weight: 500;
      }

      /* 子菜单组（同一 submenu-inner 展开时）的选项淡底，用于区分同组层级 */
      .menu-sub-group.expanded .menu-grandchild:not(.active):not(:hover) {
        background: var(--arco-bg-2);
      }

      .sidebar-footer {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--arco-primary-light);
        color: var(--arco-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        flex-shrink: 0;
      }

      .user-meta {
        flex: 1;
        min-width: 0;
      }
      .user-info {
        color: var(--arco-text-3);
        font-size: 12px;
      }
      .user-name {
        color: var(--arco-text-1);
        font-size: 14px;
        font-weight: 500;
      }

      .btn-logout {
        padding: 0 12px;
        height: 28px;
        background: var(--arco-bg-1);
        border: 1px solid var(--border);
        color: var(--arco-text-2);
        border-radius: var(--arco-radius);
        cursor: pointer;
        font-size: 12px;
        transition: all 0.15s;
        flex-shrink: 0;
      }

      .btn-logout:hover {
        color: var(--arco-primary);
        border-color: var(--arco-primary);
        background: var(--arco-primary-light);
      }

      /* 主内容区 */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .top-header {
        height: 60px;
        background: var(--header-bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        justify-content: space-between;
        flex-shrink: 0;
        box-shadow: var(--arco-shadow-light);
      }

      .breadcrumb {
        color: var(--arco-text-3);
        font-size: 14px;
      }
      .breadcrumb strong {
        color: var(--arco-text-1);
        font-weight: 500;
        margin-left: 4px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 16px;
        color: var(--arco-text-2);
        font-size: 13px;
      }

      .header-platform-filter {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header-platform-filter label {
        color: var(--arco-text-2);
        font-size: 13px;
        white-space: nowrap;
      }

      .header-platform-filter select {
        height: 32px;
        padding: 0 12px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        font-size: 13px;
        min-width: 120px;
        color: var(--arco-text-1);
        background: var(--arco-bg-1);
        outline: none;
      }

      .header-platform-filter select:hover,
      .header-platform-filter select:focus {
        border-color: var(--arco-primary);
      }

      .header-badge {
        padding: 2px 8px;
        border-radius: 10px;
        background: var(--arco-primary-light);
        color: var(--arco-primary);
        font-size: 12px;
        font-weight: 500;
      }

      .content {
        flex: 1;
        padding: 16px 20px 20px;
        overflow: auto;
      }

      .page-panel {
        background: var(--arco-bg-1);
        border-radius: var(--arco-radius);
        border: 1px solid var(--border);
        display: none;
        box-shadow: var(--arco-shadow-light);
      }

      .page-panel.active {
        display: block;
      }

      .placeholder-page {
        min-height: 360px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 48px 24px;
        color: var(--arco-text-3);
        text-align: center;
      }

      .placeholder-page .placeholder-title {
        color: var(--arco-text-1);
        font-size: 18px;
        font-weight: 500;
      }

      .placeholder-page .placeholder-desc {
        font-size: 13px;
        line-height: 1.6;
      }

      /* 应用分析 */
      .app-analysis-block {
        margin-bottom: 16px;
      }
      .app-analysis-block .page-panel {
        display: block;
      }
      .app-section-title {
        margin: 0 0 12px;
        color: var(--arco-text-1);
        font-size: 15px;
        font-weight: 500;
      }
      .app-path-depth {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }
      .app-depth-card {
        background: var(--arco-bg-1);
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        padding: 14px 16px;
        box-shadow: var(--arco-shadow-light);
      }
      .app-depth-card .depth-label {
        color: var(--arco-text-3);
        font-size: 12px;
        margin-bottom: 6px;
      }
      .app-depth-card .depth-value {
        color: var(--arco-text-1);
        font-size: 20px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .app-depth-card .depth-rate {
        margin-top: 4px;
        color: var(--arco-primary);
        font-size: 12px;
      }
      .app-path-sankey-wrap {
        margin-bottom: 8px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        overflow: hidden;
      }
      .app-path-sankey {
        width: 100%;
        height: 560px;
      }
      .app-churn-heatmap-wrap {
        margin-bottom: 8px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        overflow: hidden;
      }
      .app-churn-heatmap {
        width: 100%;
        height: 420px;
      }
      .app-churn-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .app-churn-breadcrumb {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 4px;
        font-size: 13px;
        color: var(--arco-text-2);
      }
      .app-churn-breadcrumb .crumb {
        cursor: pointer;
        color: var(--arco-primary);
      }
      .app-churn-breadcrumb .crumb:hover {
        color: var(--arco-primary-hover);
      }
      .app-churn-breadcrumb .crumb.is-current {
        color: var(--arco-text-1);
        cursor: default;
        font-weight: 500;
      }
      .app-churn-breadcrumb .sep {
        color: var(--arco-text-4);
      }
      .app-churn-hint {
        font-size: 12px;
        color: var(--arco-text-3);
      }
      .app-metric-tabs {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 0;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 12px;
      }
      .app-metric-tabs .tab-btn {
        padding: 6px 12px;
        border: none;
        background: var(--arco-bg-1);
        color: var(--arco-text-2);
        font-size: 12px;
        cursor: pointer;
      }
      .app-metric-tabs .tab-btn + .tab-btn {
        border-left: 1px solid var(--border);
      }
      .app-metric-tabs .tab-btn:hover {
        background: var(--arco-bg-3);
      }
      .app-metric-tabs .tab-btn.active {
        background: var(--arco-primary);
        color: #fff;
      }
      .app-hbar {
        display: grid;
        gap: 10px;
        margin-top: 8px;
      }
      .app-hbar-row {
        display: grid;
        grid-template-columns: 96px 1fr 64px;
        gap: 10px;
        align-items: center;
        font-size: 13px;
        color: var(--arco-text-2);
      }
      .app-hbar-track {
        height: 16px;
        background: var(--arco-bg-3);
        border-radius: 2px;
        overflow: hidden;
      }
      .app-hbar-fill {
        height: 100%;
        width: 0;
        border-radius: 2px;
        background: linear-gradient(90deg, #4080ff, #165dff);
        animation: app-hbar-grow 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: calc(var(--bar-i, 0) * 35ms);
      }
      @keyframes app-hbar-grow {
        from {
          width: 0;
        }
        to {
          width: var(--bar-w, 0%);
        }
      }
      .app-hbar-row strong {
        text-align: right;
        color: var(--arco-text-1);
        font-variant-numeric: tabular-nums;
      }
      .app-exp-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 16px;
        margin: 4px 0 10px;
        font-size: 12px;
        color: var(--arco-text-2);
      }
      .app-exp-legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .app-exp-legend i {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        display: inline-block;
      }
      .app-hbar-row.is-group {
        grid-template-columns: 96px 1fr;
        align-items: start;
      }
      .app-hbar-group {
        display: grid;
        gap: 6px;
      }
      .app-hbar-seg {
        display: grid;
        grid-template-columns: 56px 1fr 72px;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }
      .app-hbar-seg .lab {
        color: var(--arco-text-3);
      }
      .app-hbar-seg .track {
        height: 10px;
        background: var(--arco-bg-3);
        border-radius: 2px;
        overflow: hidden;
      }
      .app-hbar-seg .fill {
        height: 100%;
        width: 0;
        border-radius: 2px;
        animation: app-hbar-grow 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: calc(var(--bar-i, 0) * 28ms);
      }
      .app-hbar-seg .val {
        text-align: right;
        color: var(--arco-text-1);
        font-variant-numeric: tabular-nums;
      }
      .app-exp-ratio-up {
        color: #00b42a;
        font-weight: 500;
      }
      .app-exp-ratio-down {
        color: #f53f3f;
        font-weight: 500;
      }
      .app-exp-ratio-flat {
        color: var(--arco-text-3);
      }
      .app-exp-table-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .app-exp-seg-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.2;
        border: 1px solid transparent;
        letter-spacing: 0.02em;
      }
      .app-exp-seg-badge .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;
      }
      .app-exp-seg-badge .name {
        font-size: 15px;
      }
      .app-exp-seg-badge .sub {
        font-size: 12px;
        font-weight: 400;
        opacity: 0.85;
      }
      .app-exp-matrix-block {
        margin-bottom: 16px;
      }
      .app-exp-heatmap-wrap {
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        overflow: visible;
      }
      .app-exp-heatmap {
        width: 100%;
        height: 280px;
      }
      .app-exp-insights {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin: 12px 0 0;
      }
      .app-exp-insight-card {
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-2);
      }
      .app-exp-insight-card .label {
        font-size: 12px;
        color: var(--arco-text-3);
        margin-bottom: 6px;
      }
      .app-exp-insight-card .title {
        font-size: 14px;
        font-weight: 500;
        color: var(--arco-text-1);
        margin-bottom: 4px;
        line-height: 1.4;
      }
      .app-exp-insight-card .desc {
        font-size: 12px;
        color: var(--arco-text-2);
        line-height: 1.5;
      }
      .app-exp-drill {
        margin-top: 12px;
        padding: 14px 16px;
        border: 1px dashed #bedaff;
        border-radius: var(--arco-radius);
        background: #f7faff;
        display: none;
      }
      .app-exp-drill.is-open {
        display: block;
      }
      .app-exp-drill-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }
      .app-exp-drill-head .title {
        font-size: 14px;
        font-weight: 500;
        color: var(--arco-text-1);
      }
      .app-exp-drill-head .hint {
        font-size: 12px;
        color: var(--arco-text-3);
      }
      .app-exp-drill-close {
        border: none;
        background: transparent;
        color: var(--arco-text-3);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 2px 6px;
      }
      .app-exp-drill-close:hover {
        color: var(--arco-primary);
      }
      @media (max-width: 1100px) {
        .app-exp-insights {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 720px) {
        .app-exp-insights {
          grid-template-columns: 1fr;
        }
      }
      .app-vbar {
        height: 180px;
        margin-top: 8px;
        display: flex;
        align-items: end;
        gap: 8px;
        padding: 0 4px;
        border-bottom: 1px solid var(--border);
      }
      .app-vbar-item {
        flex: 1;
        min-width: 0;
        text-align: center;
      }
      .app-vbar-item .bar {
        margin: 0 auto 6px;
        width: 70%;
        max-width: 28px;
        border-radius: 2px 2px 0 0;
        background: linear-gradient(180deg, #4080ff, #165dff);
      }
      .app-vbar-item .val {
        font-size: 11px;
        color: var(--arco-text-1);
        font-variant-numeric: tabular-nums;
        margin-bottom: 2px;
      }
      .app-vbar-item .lab {
        font-size: 11px;
        color: var(--arco-text-3);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .app-dual-grid {
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }
      @media (max-width: 1180px) {
        .app-path-depth,
        .app-dual-grid {
          grid-template-columns: 1fr;
        }
      }

      /* 路径探索 */
      .path-explore-panel {
        padding: 16px 20px 20px;
      }
      .path-explore-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px 16px;
        margin-bottom: 16px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
      }
      .path-explore-toolbar .filter-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .path-explore-toolbar label {
        font-size: 13px;
        color: var(--arco-text-2);
        white-space: nowrap;
      }
      .path-explore-toolbar select,
      .path-explore-toolbar input[type="date"] {
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        font-size: 13px;
        color: var(--arco-text-1);
      }
      .path-explore-mode {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 12px;
      }
      .path-explore-mode button {
        padding: 7px 14px;
        border: none;
        background: var(--arco-bg-1);
        color: var(--arco-text-2);
        font-size: 13px;
        cursor: pointer;
      }
      .path-explore-mode button + button {
        border-left: 1px solid var(--border);
      }
      .path-explore-mode button.active {
        background: var(--arco-primary);
        color: #fff;
      }
      .path-explore-depth {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
        font-size: 13px;
        color: var(--arco-text-2);
      }
      .path-explore-depth .depth-btn {
        padding: 4px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--arco-bg-1);
        color: var(--arco-text-2);
        font-size: 12px;
        cursor: pointer;
      }
      .path-explore-depth .depth-btn.active {
        border-color: var(--arco-primary);
        color: var(--arco-primary);
        background: var(--arco-primary-light);
      }
      .path-explore-board {
        position: relative;
        min-height: 420px;
        padding: 12px 8px 20px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        overflow-x: auto;
      }
      .path-explore-canvas-wrap {
        position: relative;
        min-width: max(100%, 920px);
      }
      .path-explore-canvas {
        display: flex;
        gap: 0;
        min-width: max(100%, 920px);
        position: relative;
        z-index: 1;
      }
      .path-explore-col {
        flex: 1;
        min-width: 180px;
        padding: 0 10px;
        border-right: 1px dashed var(--border);
      }
      .path-explore-col:last-child {
        border-right: none;
      }
      .path-explore-col.is-target .path-explore-col-head {
        color: var(--arco-primary);
        font-weight: 600;
      }
      .path-explore-col-head {
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.04em;
        color: var(--arco-text-3);
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .path-explore-nodes {
        display: grid;
        gap: 10px;
      }
      .path-explore-node {
        position: relative;
        cursor: pointer;
        border-radius: var(--arco-radius);
        transition: box-shadow 0.15s ease;
      }
      .path-explore-node:hover {
        box-shadow: 0 2px 8px rgba(22, 93, 255, 0.12);
      }
      .path-explore-node.is-expanded > .path-explore-node-card {
        border-color: var(--arco-primary);
      }
      .path-explore-node-card {
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-2);
        overflow: hidden;
      }
      .path-explore-node-bar {
        height: 6px;
        background: linear-gradient(90deg, #4080ff, #165dff);
        border-radius: 3px 3px 0 0;
        min-width: 12%;
      }
      .path-explore-node.is-target .path-explore-node-bar {
        background: linear-gradient(90deg, #00b42a, #009a29);
      }
      .path-explore-node-body {
        padding: 8px 10px;
      }
      .path-explore-node-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--arco-text-1);
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .path-explore-node-name .expand-icon {
        font-size: 10px;
        color: var(--arco-text-3);
      }
      .path-explore-node-stats {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--arco-text-3);
        font-variant-numeric: tabular-nums;
      }
      .path-explore-node-stats strong {
        color: var(--arco-text-1);
        font-weight: 500;
      }
      .path-explore-children {
        margin: 6px 0 0 12px;
        padding-left: 10px;
        border-left: 2px solid var(--arco-primary-light);
        display: grid;
        gap: 6px;
      }
      .path-explore-children .path-explore-node-card {
        background: var(--arco-bg-1);
      }
      .path-explore-children .path-explore-node-bar {
        height: 4px;
        background: linear-gradient(90deg, #94bfff, #6aa1ff);
      }
      .path-explore-links {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }
      .path-explore-links path {
        fill: none;
        stroke: #c9dcff;
        stroke-width: 2;
        opacity: 0.85;
      }
      .path-explore-hint {
        margin: 10px 0 0;
        font-size: 12px;
        color: var(--arco-text-3);
      }
      .path-explore-top {
        margin-top: 16px;
      }
      .path-explore-top .app-section-title {
        margin-bottom: 10px;
      }
      .path-explore-top-rank {
        display: grid;
        gap: 8px;
      }
      .path-explore-top-item {
        display: grid;
        grid-template-columns: 36px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        font-size: 13px;
      }
      .path-explore-top-item .rank {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--arco-bg-3);
        color: var(--arco-text-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
      }
      .path-explore-top-item:nth-child(1) .rank {
        background: #fff7e8;
        color: #ff7d00;
      }
      .path-explore-top-item:nth-child(2) .rank {
        background: var(--arco-primary-light);
        color: var(--arco-primary);
      }
      .path-explore-top-item:nth-child(3) .rank {
        background: #e8ffea;
        color: #00b42a;
      }
      .path-explore-top-path {
        color: var(--arco-text-1);
        line-height: 1.5;
      }
      .path-explore-top-path .arrow {
        color: var(--arco-text-4);
        margin: 0 4px;
      }
      .path-explore-top-pct {
        color: var(--arco-primary);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      /* 筛选区 - Arco Form */
      .filter-bar {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px 24px;
        background: var(--arco-bg-1);
      }

      .filter-bar-global {
        position: sticky;
        top: 0;
        z-index: 30;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        box-shadow: var(--arco-shadow-light);
      }

      .filter-bar-local {
        padding: 10px 0 12px;
        margin: 8px 0 4px;
        border-bottom: 1px dashed var(--border);
        background: transparent;
      }

      .chart-card > .filter-bar-local {
        padding-left: 0;
        padding-right: 0;
      }

      .page-panel > .filter-bar-local {
        padding: 12px 20px;
        margin: 0;
        border-bottom: 1px solid var(--border);
      }

      .filter-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .filter-item label {
        color: var(--arco-text-2);
        white-space: nowrap;
        font-size: 14px;
      }

      .filter-item select,
      .filter-item input[type="date"],
      .filter-item input[type="text"] {
        height: 32px;
        padding: 0 12px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        font-size: 14px;
        min-width: 160px;
        color: var(--arco-text-1);
        background: var(--arco-bg-1);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        outline: none;
      }

      .filter-item select:hover,
      .filter-item input[type="date"]:hover,
      .filter-item input[type="text"]:hover {
        border-color: var(--arco-primary);
      }

      .filter-item select:focus,
      .filter-item input[type="date"]:focus,
      .filter-item input[type="text"]:focus {
        border-color: var(--arco-primary);
        box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1);
      }

      .filter-item-channel-name {
        display: none;
      }

      .filter-item-channel-name.is-visible {
        display: flex;
      }

      /* Arco Button */
      .btn {
        height: 32px;
        padding: 0 16px;
        border-radius: var(--arco-radius);
        border: 1px solid var(--border);
        background: var(--arco-bg-1);
        cursor: pointer;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--arco-text-1);
        transition: all 0.15s cubic-bezier(0.34, 0.69, 0.1, 1);
      }

      .btn:hover {
        border-color: var(--arco-primary);
        color: var(--arco-primary);
        background: var(--arco-bg-1);
      }

      .btn-primary {
        background: var(--arco-primary);
        border-color: var(--arco-primary);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--arco-primary-hover);
        border-color: var(--arco-primary-hover);
        color: #fff;
      }

      .toolbar {
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
        background: var(--arco-bg-1);
      }

      .page-title {
        font-size: 16px;
        font-weight: 500;
        color: var(--arco-text-1);
      }

      /* 表格 */
      .table-wrap {
        overflow: auto;
        max-height: calc(100vh - 320px);
        position: relative;
      }

      table.data-table {
        border-collapse: separate;
        border-spacing: 0;
        width: max-content;
        min-width: 100%;
        font-size: 13px;
        --sticky-col-1-width: 112px;
        --sticky-col-2-width: 96px;
        --sticky-col-3-width: 96px;
        --sticky-col-4-width: 100px;
        --sticky-total-width: calc(
          var(--sticky-col-1-width) + var(--sticky-col-2-width) +
            var(--sticky-col-3-width) + var(--sticky-col-4-width)
        );
        --group-row-height: 37px;
      }

      .data-table th,
      .data-table td {
        border: none;
        border-bottom: 1px solid var(--border);
        padding: 10px 16px;
        text-align: center;
        white-space: nowrap;
      }

      .data-table thead th {
        background: var(--arco-bg-3);
        font-weight: 500;
        position: sticky;
        top: 0;
        z-index: 2;
        color: var(--arco-text-1);
        font-size: 14px;
      }

      .data-table thead tr.group-row th {
        top: 0;
        font-weight: 600;
        font-size: 12px;
        height: var(--group-row-height);
      }

      .data-table thead tr.col-row th {
        top: var(--group-row-height);
        font-weight: 500;
        font-size: 12px;
      }

      .data-table thead tr.col-row th .sort-icon {
        display: inline-flex;
        flex-direction: column;
        margin-left: 4px;
        vertical-align: middle;
        line-height: 0.6;
        font-size: 8px;
        color: var(--arco-text-4);
        cursor: pointer;
      }

      .data-table thead tr.col-row th .sort-icon:hover {
        color: var(--arco-primary);
      }

      .data-table tbody tr {
        transition: background 0.15s;
      }
      .data-table tbody tr:hover {
        background: var(--arco-bg-2);
      }

      .data-table tbody td {
        color: var(--arco-text-1);
        background: var(--arco-bg-1);
      }
      .data-table tbody tr:nth-child(even) td {
        background: var(--arco-bg-2);
      }
      .data-table tbody tr:nth-child(even) [class*="sticky-col-"] {
        background: var(--arco-bg-2);
      }
      .data-table tbody tr:hover td,
      .data-table tbody tr:hover [class*="sticky-col-"] {
        background: #e8f3ff;
      }

      /* 固定列：日期、来源渠道、渠道名、所属平台 */
      .data-table [class*="sticky-col-"] {
        position: sticky;
        background-clip: padding-box;
      }

      .data-table .sticky-col-1 {
        left: 0;
        min-width: var(--sticky-col-1-width);
        max-width: var(--sticky-col-1-width);
        z-index: 1;
        background: var(--arco-bg-1);
      }

      .data-table .sticky-col-2 {
        left: var(--sticky-col-1-width);
        min-width: var(--sticky-col-2-width);
        max-width: var(--sticky-col-2-width);
        z-index: 1;
        background: var(--arco-bg-1);
      }

      .data-table .sticky-col-3 {
        left: calc(var(--sticky-col-1-width) + var(--sticky-col-2-width));
        min-width: var(--sticky-col-3-width);
        max-width: var(--sticky-col-3-width);
        z-index: 1;
        background: var(--arco-bg-1);
      }

      .data-table tbody tr:nth-child(even) .sticky-col-1,
      .data-table tbody tr:nth-child(even) .sticky-col-2,
      .data-table tbody tr:nth-child(even) .sticky-col-3 {
        background: var(--arco-bg-2);
      }

      .data-table .sticky-col-4 {
        left: calc(
          var(--sticky-col-1-width) + var(--sticky-col-2-width) +
            var(--sticky-col-3-width)
        );
        min-width: var(--sticky-col-4-width);
        max-width: var(--sticky-col-4-width);
        z-index: 1;
        background: var(--arco-bg-1);
        box-shadow: 4px 0 8px -4px rgba(29, 33, 41, 0.08);
      }

      .data-table tbody tr:nth-child(even) .sticky-col-4 {
        background: var(--arco-bg-2);
      }

      .data-table tbody tr:hover [class*="sticky-col-"] {
        background: #e8f3ff;
      }

      /* 表头固定列（纵向 + 横向） */
      .data-table thead [class*="sticky-col-"] {
        z-index: 4;
        background: var(--arco-bg-3);
      }

      .data-table thead tr.group-row .sticky-group-head {
        position: sticky;
        left: 0;
        top: 0;
        z-index: 6;
        min-width: var(--sticky-total-width);
        box-shadow: 4px 0 8px -4px rgba(29, 33, 41, 0.08);
      }

      .data-table thead tr.col-row [class*="sticky-col-"] {
        z-index: 5;
      }

      /* 分组表头：Arco 主色间隔区分 */
      .data-table thead tr.group-row th:nth-child(odd) {
        background: var(--group-header) !important;
      }

      .data-table thead tr.group-row th:nth-child(even) {
        background: var(--group-header-alt) !important;
      }

      /* 分页 - Arco Pagination */
      .pagination {
        padding: 12px 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        border-top: 1px solid var(--border);
        background: var(--arco-bg-1);
      }

      .pagination button {
        min-width: 32px;
        height: 32px;
        border: 1px solid var(--border);
        background: var(--arco-bg-1);
        border-radius: var(--arco-radius);
        cursor: pointer;
        font-size: 14px;
        color: var(--arco-text-1);
        transition: all 0.15s;
      }

      .pagination button:hover:not(:disabled) {
        border-color: var(--arco-primary);
        color: var(--arco-primary);
      }

      .pagination button.active {
        background: var(--arco-primary);
        border-color: var(--arco-primary);
        color: #fff;
      }

      .pagination button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        color: var(--arco-text-4);
      }

      .pagination-info {
        margin-left: 8px;
        color: var(--arco-text-3);
        font-size: 14px;
      }

      /* 经营总览 - Arco Statistic / Card */
      .overview-insights {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 16px;
      }

      .overview-insights .metric-card {
        min-height: 128px;
        padding: 16px 18px;
      }

      .overview-insights .metric-module {
        display: inline-flex;
        align-items: center;
        height: 20px;
        padding: 0 8px;
        margin-bottom: 6px;
        border-radius: 2px;
        font-size: 12px;
        font-weight: 500;
        color: var(--arco-primary);
        background: var(--arco-primary-light);
      }

      .overview-insights .metric-compares {
        margin-top: 10px;
        display: grid;
        gap: 4px;
      }

      .overview-insights .metric-compare {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        color: var(--arco-text-3);
        line-height: 1.4;
      }

      .overview-insights .metric-compare .cmp-label {
        flex-shrink: 0;
        margin-right: 8px;
      }

      .overview-insights .metric-compare .cmp-value {
        font-variant-numeric: tabular-nums;
        font-weight: 500;
      }

      .overview-insights .metric-compare.up .cmp-value {
        color: var(--arco-success);
      }
      .overview-insights .metric-compare.down .cmp-value {
        color: var(--arco-danger);
      }
      .overview-insights .metric-compare.flat .cmp-value {
        color: var(--arco-text-3);
      }

      /* 分时数据对比 */
      .realtime-panel {
        background: var(--arco-bg-1);
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        box-shadow: var(--arco-shadow-light);
        margin-bottom: 16px;
        padding: 16px 20px 20px;
      }
      .realtime-panel-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .realtime-panel-head .chart-title {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: var(--arco-text-1);
      }
      .realtime-refresh {
        border: none;
        background: transparent;
        color: var(--arco-text-3);
        cursor: pointer;
        font-size: 14px;
        padding: 2px 4px;
        line-height: 1;
      }
      .realtime-refresh:hover {
        color: var(--arco-primary);
      }
      .realtime-filters {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .ms-wrap {
        position: relative;
        flex: 1;
        min-width: 280px;
        max-width: 520px;
      }
      .ms-trigger {
        min-height: 36px;
        width: 100%;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 4px 32px 4px 8px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        cursor: pointer;
        position: relative;
      }
      .ms-trigger:hover {
        border-color: var(--arco-primary);
      }
      .ms-trigger.open {
        border-color: var(--arco-primary);
        box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.15);
      }
      .ms-trigger::after {
        content: "▾";
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--arco-text-3);
        font-size: 12px;
      }
      .ms-placeholder {
        color: var(--arco-text-3);
        font-size: 13px;
        padding: 2px 4px;
      }
      .ms-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        height: 24px;
        padding: 0 8px;
        background: var(--arco-bg-3);
        border-radius: 4px;
        font-size: 12px;
        color: var(--arco-text-1);
      }
      .ms-tag button {
        border: none;
        background: transparent;
        color: var(--arco-text-3);
        cursor: pointer;
        font-size: 12px;
        padding: 0;
        line-height: 1;
      }
      .ms-tag button:hover {
        color: var(--arco-danger, #f53f3f);
      }
      .ms-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        z-index: 30;
        max-height: 320px;
        overflow: auto;
        background: var(--arco-bg-1);
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        box-shadow: 0 4px 16px rgba(29, 33, 41, 0.12);
        padding: 8px 0;
      }
      .ms-dropdown.open {
        display: block;
      }
      .ms-group-title {
        padding: 8px 14px 4px;
        font-size: 12px;
        font-weight: 600;
        color: var(--arco-text-3);
      }
      .ms-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        font-size: 13px;
        color: var(--arco-text-1);
        cursor: pointer;
      }
      .ms-option:hover {
        background: var(--arco-bg-2);
      }
      .ms-option input {
        accent-color: var(--arco-primary);
      }
      .realtime-date-range {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--arco-text-2);
      }
      .realtime-date-range input[type="date"] {
        height: 36px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        color: var(--arco-text-1);
        font-size: 13px;
      }
      .realtime-chart-wrap {
        position: relative;
        width: 100%;
        height: 320px;
      }
      .realtime-chart-wrap svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .realtime-chart-wrap.rt-animating::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          105deg,
          transparent 35%,
          rgba(22, 93, 255, 0.08) 50%,
          transparent 65%
        );
        background-size: 220% 100%;
        animation: rt-shimmer 1.1s ease-out;
      }
      @keyframes rt-shimmer {
        from {
          background-position: 100% 0;
        }
        to {
          background-position: -100% 0;
        }
      }
      .rt-series-line {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .rt-series-line.rt-line-flow {
        stroke-dasharray: 7 11;
        animation: rt-flow 1.4s linear infinite;
      }
      @keyframes rt-flow {
        to {
          stroke-dashoffset: -36;
        }
      }
      .rt-flow-dot {
        opacity: 0;
      }
      .rt-flow-dot.is-running {
        opacity: 1;
        filter: drop-shadow(0 0 3px currentColor);
      }
      .rt-legend.rt-animating span {
        animation: rt-legend-in 0.45s ease both;
      }
      .rt-legend.rt-animating span:nth-child(1) {
        animation-delay: 0.05s;
      }
      .rt-legend.rt-animating span:nth-child(2) {
        animation-delay: 0.12s;
      }
      .rt-legend.rt-animating span:nth-child(3) {
        animation-delay: 0.19s;
      }
      .rt-legend.rt-animating span:nth-child(4) {
        animation-delay: 0.26s;
      }
      .rt-legend.rt-animating span:nth-child(5) {
        animation-delay: 0.33s;
      }
      .rt-legend.rt-animating span:nth-child(n + 6) {
        animation-delay: 0.4s;
      }
      @keyframes rt-legend-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .rt-data-table tbody tr.rt-row-anim {
        animation: rt-row-in 0.38s ease both;
      }
      @keyframes rt-row-in {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .realtime-table-panel {
        margin-top: 16px;
      }
      .realtime-table-panel .table-wrap {
        max-height: none;
        overflow-x: auto;
        overflow-y: visible;
      }
      .rt-table-empty {
        padding: 32px 20px;
        text-align: center;
        color: var(--arco-text-3);
        font-size: 13px;
      }
      .rt-data-table .sticky-col-1 {
        min-width: 88px;
        max-width: 88px;
      }
      .rt-data-table thead tr.col-row th {
        top: 0;
      }
      .rt-axis {
        font-size: 11px;
        fill: var(--arco-text-3);
      }
      .rt-grid {
        stroke: var(--border);
        stroke-width: 1;
      }
      .rt-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        margin-bottom: 8px;
        font-size: 12px;
        color: var(--arco-text-2);
      }
      .rt-legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .rt-legend i {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }
      .rt-tooltip {
        position: absolute;
        pointer-events: none;
        display: none;
        min-width: 160px;
        padding: 10px 12px;
        background: rgba(29, 33, 41, 0.88);
        color: #fff;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.6;
        z-index: 20;
        transform: translate(-50%, -110%);
        white-space: nowrap;
      }
      .rt-tooltip .rt-tip-time {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .rt-tooltip .rt-tip-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .rt-tooltip .rt-tip-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .rt-crosshair {
        stroke: var(--arco-primary);
        stroke-width: 1;
        stroke-dasharray: 3 3;
        pointer-events: none;
      }

      .metric-card,
      .chart-card {
        background: var(--arco-bg-1);
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        box-shadow: var(--arco-shadow-light);
      }

      .metric-card {
        padding: 20px;
        min-height: 108px;
      }

      .metric-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--arco-text-2);
        font-size: 14px;
      }

      .metric-value {
        margin-top: 8px;
        color: var(--arco-text-1);
        font-size: 24px;
        line-height: 32px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .metric-trend {
        margin-top: 8px;
        color: var(--arco-text-3);
        font-size: 12px;
      }

      .metric-trend.up {
        color: var(--arco-success);
      }
      .metric-trend.down {
        color: var(--arco-danger);
      }

      .metric-hint {
        margin-top: 2px;
        font-size: 12px;
        color: var(--arco-text-3);
        line-height: 1.4;
      }

      .kpi-grid.cols-8 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      /* 付费转化漏斗（纵向） */
      .pay-funnel {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .pay-funnel-step {
        width: 100%;
        max-width: 360px;
        text-align: center;
        padding: 16px 20px;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        border-radius: 4px;
      }
      .pay-funnel-step:nth-child(1) {
        background: #165dff;
      }
      .pay-funnel-step:nth-child(3) {
        background: #4080ff;
        width: 72%;
      }
      .pay-funnel-step:nth-child(5) {
        background: #6aa1ff;
        width: 56%;
        color: var(--arco-text-1);
      }
      .pay-funnel-step small {
        display: block;
        margin-top: 6px;
        font-size: 20px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .pay-funnel-rate {
        padding: 10px 0;
        color: var(--arco-text-2);
        font-size: 13px;
        font-weight: 500;
      }

      .status-tag {
        display: inline-flex;
        align-items: center;
        padding: 0 8px;
        height: 20px;
        border-radius: 2px;
        font-size: 12px;
        font-weight: 500;
      }

      .status-tag.success {
        color: var(--arco-success);
        background: #e8ffea;
      }
      .status-tag.warning {
        color: var(--arco-warning);
        background: #fff7e8;
      }
      .status-tag.danger {
        color: var(--arco-danger);
        background: #ffece8;
      }
      .status-tag.info {
        color: var(--arco-primary);
        background: var(--arco-primary-light);
      }

      .chart-grid {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }

      .chart-card {
        padding: 20px;
        min-height: 220px;
      }

      .chart-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--arco-text-1);
        font-size: 14px;
        font-weight: 500;
      }

      .chart-subtitle {
        margin: 10px 0;
        color: var(--arco-text-3);
        font-size: 12px;
      }

      .chart-bars {
        height: 120px;
        margin-top: 16px;
        display: flex;
        align-items: end;
        gap: 8px;
        padding: 0 4px;
        border-bottom: 1px solid var(--border);
      }

      .chart-bar {
        flex: 1;
        min-width: 12px;
        border-radius: 2px 2px 0 0;
        background: var(--arco-primary);
        opacity: 0.85;
      }

      .chart-legend {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        color: var(--arco-text-3);
        font-size: 12px;
      }

      .insight-list {
        margin-top: 16px;
        display: grid;
        gap: 0;
      }
      .insight-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--arco-border-2);
        color: var(--arco-text-2);
        font-size: 14px;
      }

      .insight-row:last-child {
        border-bottom: 0;
      }
      .insight-row strong {
        color: var(--arco-text-1);
        font-weight: 500;
      }

      .table-wrap::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .table-wrap::-webkit-scrollbar-thumb {
        border-radius: 3px;
        background: var(--arco-text-4);
      }

      .data-table thead tr.group-row th {
        color: var(--arco-text-1);
        font-weight: 500;
      }

      .data-table thead tr.col-row th {
        color: var(--arco-text-2);
        font-weight: 400;
        font-size: 13px;
      }

      .data-table td:first-child {
        color: var(--arco-text-2);
        font-variant-numeric: tabular-nums;
      }

      .table-wrap {
        max-height: calc(100vh - 340px);
      }

      /* 用户增长分析模块 */
      .analysis-block {
        margin-bottom: 16px;
      }
      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        color: var(--arco-text-1);
        font-size: 16px;
        font-weight: 500;
      }
      .section-heading .hint {
        color: var(--arco-text-3);
        font-size: 12px;
        font-weight: 400;
      }
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 16px;
      }
      .kpi-grid.cols-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .compare-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        margin-top: 12px;
      }
      .compare-table th,
      .compare-table td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }
      .compare-table th {
        background: var(--arco-bg-3);
        color: var(--arco-text-2);
        font-weight: 500;
      }
      .compare-table td {
        color: var(--arco-text-1);
      }
      .delta-up {
        color: var(--arco-success);
        font-weight: 500;
      }
      .delta-down {
        color: var(--arco-danger);
        font-weight: 500;
      }

      .line-chart {
        height: 140px;
        margin-top: 16px;
        position: relative;
        border-bottom: 1px solid var(--border);
        background: repeating-linear-gradient(
          to top,
          transparent 0,
          transparent 34px,
          var(--arco-border-2) 35px
        );
      }
      .line-chart svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .line-legend {
        display: flex;
        gap: 16px;
        margin-top: 10px;
        font-size: 12px;
        color: var(--arco-text-3);
      }
      .line-legend i {
        display: inline-block;
        width: 12px;
        height: 3px;
        border-radius: 2px;
        margin-right: 6px;
        vertical-align: middle;
      }

      .pie-wrap {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-top: 16px;
        min-height: 160px;
      }
      .pie-chart {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: conic-gradient(
          #165dff 0 45%,
          #14c9c9 45% 75%,
          #f7ba1e 75% 100%
        );
        position: relative;
        flex-shrink: 0;
      }
      .pie-chart::after {
        content: "";
        position: absolute;
        inset: 28px;
        border-radius: 50%;
        background: var(--arco-bg-1);
      }
      .pie-legend {
        flex: 1;
        display: grid;
        gap: 10px;
      }
      .pie-legend-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        color: var(--arco-text-2);
      }
      .pie-legend-item .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 8px;
        display: inline-block;
      }
      .pie-legend-item strong {
        color: var(--arco-text-1);
        font-weight: 500;
      }

      .hbar-list {
        margin-top: 16px;
        display: grid;
        gap: 14px;
      }
      .hbar-row {
        display: grid;
        grid-template-columns: 72px 1fr 56px;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--arco-text-2);
      }
      .hbar-track {
        height: 18px;
        background: var(--arco-bg-3);
        border-radius: 2px;
        overflow: hidden;
      }
      .hbar-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #4080ff, #165dff);
      }
      .hbar-row strong {
        text-align: right;
        color: var(--arco-text-1);
        font-variant-numeric: tabular-nums;
      }

      .funnel {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .funnel-step {
        width: 100%;
        max-width: 420px;
        text-align: center;
        padding: 14px 16px;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        clip-path: polygon(4% 0, 96% 0, 100% 100%, 0 100%);
      }
      .funnel-step:nth-child(1) {
        background: #165dff;
        width: 100%;
        clip-path: polygon(0 0, 100% 0, 96% 100%, 4% 100%);
      }
      .funnel-step:nth-child(3) {
        background: #4080ff;
        width: 86%;
        clip-path: polygon(2% 0, 98% 0, 94% 100%, 6% 100%);
      }
      .funnel-step:nth-child(5) {
        background: #6aa1ff;
        width: 70%;
        clip-path: polygon(4% 0, 96% 0, 92% 100%, 8% 100%);
      }
      .funnel-step:nth-child(7) {
        background: #94bfff;
        width: 56%;
        color: var(--arco-text-1);
        clip-path: polygon(6% 0, 94% 0, 90% 100%, 10% 100%);
      }
      .funnel-rate {
        padding: 6px 0;
        color: var(--arco-text-3);
        font-size: 12px;
      }
      .funnel-step small {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        font-weight: 400;
        opacity: 0.9;
      }

      .vbar-compare {
        height: 160px;
        margin-top: 16px;
        display: flex;
        align-items: end;
        justify-content: space-around;
        gap: 20px;
        border-bottom: 1px solid var(--border);
        padding: 0 12px;
      }
      .vbar-item {
        flex: 1;
        max-width: 80px;
        text-align: center;
      }
      .vbar-item .bar {
        height: var(--h, 50%);
        margin: 0 auto 8px;
        width: 36px;
        border-radius: 2px 2px 0 0;
        background: var(--arco-primary);
      }
      .vbar-item .label {
        font-size: 12px;
        color: var(--arco-text-3);
      }
      .vbar-item .val {
        font-size: 13px;
        color: var(--arco-text-1);
        font-weight: 500;
        margin-bottom: 4px;
      }

      /* 表格 / 图表 视图切换 */
      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .view-toggle {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }
      .view-toggle .vt-btn {
        padding: 6px 16px;
        background: var(--arco-bg-1);
        border: none;
        cursor: pointer;
        font-size: 13px;
        color: var(--arco-text-2);
        transition:
          background 0.15s,
          color 0.15s;
      }
      .view-toggle .vt-btn + .vt-btn {
        border-left: 1px solid var(--border);
      }
      .view-toggle .vt-btn:hover {
        background: var(--arco-bg-3);
      }
      .view-toggle .vt-btn.active {
        background: var(--arco-primary);
        color: #fff;
      }

      .chart-range-toggle .vt-btn {
        padding: 4px 10px;
        font-size: 12px;
      }

      .chart-range-toggle {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }

      .chart-range-toggle .range-btn {
        padding: 4px 10px;
        background: var(--arco-bg-1);
        border: none;
        cursor: pointer;
        font-size: 12px;
        color: var(--arco-text-2);
        transition:
          background 0.15s,
          color 0.15s;
      }

      .chart-range-toggle .range-btn + .range-btn {
        border-left: 1px solid var(--border);
      }

      .chart-range-toggle .range-btn:hover {
        background: var(--arco-bg-3);
      }

      .chart-range-toggle .range-btn.active {
        background: var(--arco-primary);
        color: #fff;
      }

      .chart-title-text {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .chart-view {
        padding: 20px;
      }
      .chart-view .chart-grid {
        margin-bottom: 16px;
      }

      /* 双轴组合图 */
      .combo-chart {
        margin-top: 16px;
        width: 100%;
      }
      .combo-chart svg {
        width: 100%;
        height: auto;
        display: block;
      }
      .combo-chart .axis-label {
        font-size: 8px;
        fill: var(--arco-text-3);
      }
      .combo-chart .axis-title {
        font-size: 8px;
        fill: var(--arco-text-2);
        font-weight: 500;
      }
      .combo-chart .funnel-axis {
        font-size: 8px;
        fill: var(--arco-text-3);
        font-variant-numeric: tabular-nums;
      }
      .grid-line {
        stroke: var(--border);
        stroke-width: 1;
      }

      /* 分步漏斗图 */
      .ga-funnel {
        margin-top: 16px;
        width: 100%;
      }
      .ga-funnel svg {
        width: 100%;
        height: auto;
        display: block;
      }
      .ga-funnel .grid-line.dashed {
        stroke-dasharray: 4 4;
      }
      .ga-funnel .funnel-axis {
        font-size: 10px;
        fill: var(--arco-text-3);
        font-variant-numeric: tabular-nums;
      }
      .ga-funnel .funnel-step-idx {
        font-size: 11px;
        fill: var(--arco-text-3);
      }
      .ga-funnel .funnel-step-name {
        font-size: 10px;
        font-weight: 400;
        fill: var(--arco-text-1);
      }
      .ga-funnel .funnel-comp {
        font-size: 10px;
        font-weight: 300;
        fill: var(--arco-text-1);
      }
      .ga-funnel .funnel-abandon-title {
        font-size: 11px;
        fill: var(--arco-text-3);
      }
      .ga-funnel .funnel-abandon {
        font-size: 11px;
        fill: var(--arco-text-2);
        font-variant-numeric: tabular-nums;
      }

      /* 渠道排行榜 */
      .rank-list {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }
      .rank-head,
      .rank-row {
        display: grid;
        grid-template-columns: 88px 1fr 56px;
        align-items: center;
        gap: 12px;
        font-size: 13px;
      }
      .rank-head {
        color: var(--arco-text-3);
        font-size: 12px;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--border);
      }
      .rank-head span:nth-child(2) {
        text-align: left;
      }
      .rank-head span:last-child {
        text-align: right;
      }
      .rank-name {
        color: var(--arco-text-1);
        font-weight: 500;
      }
      .rank-bar {
        height: 20px;
        background: var(--arco-bg-3);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .rank-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #4080ff, #165dff);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 8px;
        color: #fff;
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        min-width: 40px;
      }
      .rank-rate {
        text-align: right;

      function formatNumber(val) {
        if (typeof val === "string" && val.includes("%")) return val;
        if (typeof val === "number") {
          if (Number.isInteger(val)) return val.toLocaleString("zh-CN");
          return val.toLocaleString("zh-CN", {
            minimumFractionDigits: 1,
            maximumFractionDigits: 2,
          });
        }
        return val;
      }

      function bindLocalChannelFilter(scope) {
        const sourceSelect = scope.querySelector(".local-source-channel");
        if (!sourceSelect) return;
        const filterId = sourceSelect.dataset.filterId;
        const nameWrap = scope.querySelector(
          `.local-channel-name-wrap[data-filter-id="${filterId}"]`,
        );
        const nameInput = scope.querySelector(
          `.local-channel-name[data-filter-id="${filterId}"]`,
        );
        const nameList = scope.querySelector(`#channelNameList-${filterId}`);

        const updateChannelNameFilter = () => {
          if (!nameWrap || !nameInput || !nameList) return;
          const source = sourceSelect.value;
          if (!source) {
            nameWrap.classList.remove("is-visible");
            nameInput.value = "";
            nameList.innerHTML = "";
            return;
          }
          nameWrap.classList.add("is-visible");
          nameInput.placeholder = `搜索渠道名，如 ${source}01`;
          const names = CHANNEL_NAME_MAP[source] || [];
          nameList.innerHTML = names
            .map((n) => `<option value="${n}"></option>`)
            .join("");
        };

        sourceSelect.addEventListener("change", updateChannelNameFilter);
      }

      function renderComboChart() {
        const labels = [
          "07/11",
          "07/12",
          "07/13",
          "07/14",
          "07/15",
          "07/16",
          "07/17",
        ];
        const install = [8450, 9200, 9680, 10230, 11100, 11890, 12580];
        const newUsers = [6320, 6800, 7250, 7680, 8300, 8650, 9120];
        const convRate = [75.1, 74.2, 73.5, 72.8, 72.4, 71.7, 71.2];

        const W = 760,
          H = 300,
          padL = 52,
          padR = 52,
          padT = 24,
          padB = 40;
        const plotW = W - padL - padR;
        const plotH = H - padT - padB;
        const n = labels.length;
        const step = plotW / n;
        const leftMax = 14000;
        const rightMax = 100;
        const barW = 15,
          gap = 4;
        const yCount = (v) => padT + plotH * (1 - v / leftMax);
        const yPct = (v) => padT + plotH * (1 - v / rightMax);

        let grid = "",
          leftAxis = "",
          rightAxis = "";
        for (let i = 0; i <= 4; i++) {
          const y = padT + (plotH / 4) * i;
          grid += `<line class="grid-line" x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}"></line>`;
          leftAxis += `<text class="axis-label" x="${padL - 8}" y="${y + 3}" text-anchor="end">${(leftMax - (leftMax / 4) * i).toLocaleString("zh-CN")}</text>`;
          rightAxis += `<text class="axis-label" x="${W - padR + 8}" y="${y + 3}" text-anchor="start">${rightMax - (rightMax / 4) * i}%</text>`;
        }

        let bars = "",
          xLabels = "",
          linePts = [],
          dots = "";
        labels.forEach((lab, i) => {
          const cx = padL + step * i + step / 2;
          const x1 = cx - barW - gap / 2;
          const x2 = cx + gap / 2;
          bars += `<rect x="${x1}" y="${yCount(install[i])}" width="${barW}" height="${(plotH * install[i]) / leftMax}" rx="3" fill="#165DFF"></rect>`;
          bars += `<rect x="${x2}" y="${yCount(newUsers[i])}" width="${barW}" height="${(plotH * newUsers[i]) / leftMax}" rx="3" fill="#14C9C9"></rect>`;
          const ly = yPct(convRate[i]);
          linePts.push(`${cx},${ly}`);
          dots += `<circle cx="${cx}" cy="${ly}" r="3.5" fill="#fff" stroke="#F7BA1E" stroke-width="2"></circle>`;
          xLabels += `<text class="axis-label" x="${cx}" y="${H - padB + 18}" text-anchor="middle">${lab}</text>`;
        });

        return `
        <div class="combo-chart">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
            ${grid}
            ${bars}
            <polyline fill="none" stroke="#F7BA1E" stroke-width="2.5" points="${linePts.join(" ")}"></polyline>
            ${dots}
            ${leftAxis}
            ${rightAxis}
            ${xLabels}
          </svg>
        </div>
        <div class="line-legend">
          <span><i style="background:#165DFF"></i>安装人数</span>
          <span><i style="background:#14C9C9"></i>新增用户数</span>
          <span><i style="background:#F7BA1E"></i>注册转化率</span>
        </div>`;
      }

      function renderFunnelChart(steps) {
        steps = steps || [
          { name: "安装用户", value: 100000 },
          { name: "新增设备", value: 80000 },
          { name: "注册用户", value: 50000 },
          { name: "绑定用户", value: 45000 },
        ];
        const W = 760,
          H = 356;
        const plotTop = 66,
          plotBottom = 270;
        const plotH = plotBottom - plotTop;
        const axisLeft = 46,
          plotRight = W - 14;
        const plotLeft = axisLeft;
        const plotW = plotRight - plotLeft;
        const n = steps.length;
        const colW = plotW / n;
        const darkW = colW * 0.58;
        const maxVal = Math.max(...steps.map((s) => s.value), 1);
        const yVal = (v) => plotBottom - plotH * (v / maxVal);
        const fmt = (v) => {
          if (v === 0) return "0";
          if (v >= 10000)
            return (
              (v % 10000 === 0 ? v / 10000 : (v / 10000).toFixed(1)) + "万"
            );
          return v.toLocaleString("zh-CN");
        };
        const nameFont = n > 5 ? 11 : 13;

        let grid = "",
          yLabels = "";
        [0, 0.5, 1].forEach((t) => {
          const y = plotBottom - plotH * t;
          grid += `<line class="grid-line dashed" x1="${plotLeft}" y1="${y}" x2="${plotRight}" y2="${y}"></line>`;
          yLabels += `<text class="funnel-axis" x="${plotLeft - 8}" y="${y + 4}" text-anchor="end">${fmt(maxVal * t)}</text>`;
        });

        let seps = "",
          bars = "",
          headers = "",
          abandons = "";
        seps += `<line class="grid-line" x1="${plotLeft}" y1="16" x2="${plotLeft}" y2="${plotBottom}"></line>`;
        steps.forEach((s, i) => {
          const colX = plotLeft + colW * i;
          const sepX = colX + colW;
          const topY = yVal(s.value);
          bars += `<rect x="${colX}" y="${topY}" width="${darkW}" height="${plotBottom - topY}" fill="#4080FF"></rect>`;
          if (i < n - 1) {
            const nextTopY = yVal(steps[i + 1].value);
            const lx = colX + darkW,
              rx = colX + colW;
            bars += `<polygon points="${lx},${topY} ${rx},${nextTopY} ${rx},${plotBottom} ${lx},${plotBottom}" fill="#C9DCFF"></polygon>`;
          }
          seps += `<line class="grid-line dashed" x1="${sepX}" y1="16" x2="${sepX}" y2="${plotBottom}"></line>`;

          const comp = i === 0 ? 100 : (s.value / steps[i - 1].value) * 100;
          headers += `<text class="funnel-step-idx" x="${colX + 4}" y="30">Step ${i + 1}</text>`;
          headers += `<text class="funnel-step-name" x="${colX + 4}" y="52" style="font-size:${nameFont}px">${s.name}</text>`;
          headers += `<text class="funnel-comp" x="${sepX - 6}" y="52" text-anchor="end" style="font-size:${nameFont}px">${comp.toFixed(1)}%</text>`;

          if (i < n - 1) {
            const lost = s.value - steps[i + 1].value;
            const rate = (lost / s.value) * 100;
            const ay = plotBottom + 30;
            headers += `<text class="funnel-abandon-title" x="${colX + 4}" y="${ay - 16}">流失率</text>`;
            abandons += `<rect x="${colX + 4}" y="${ay - 9}" width="9" height="9" rx="2" fill="#4080FF"></rect>`;
            abandons += `<text class="funnel-abandon" x="${colX + 18}" y="${ay}">${fmt(Math.max(lost, 0))} · ${rate.toFixed(1)}%</text>`;
          }
        });

        return `
        <div class="ga-funnel">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
            ${grid}
            ${bars}
            ${seps}
            ${headers}
            ${yLabels}
            ${abandons}
          </svg>
        </div>`;
      }

      function buildRecentTrendLabels(dayCount = 30) {
        const labels = [];
        for (let i = 0; i < dayCount; i++) {

          labels.push(`${pad2(d.getMonth() + 1)}/${pad2(d.getDate())}`);
        }

      }

      function buildTrendLabelsBeforeEnd(
        dayCount,
        endDate = new Date(2025, 6, 17),
      ) {
        const labels = [];
        for (let i = dayCount - 1; i >= 0; i--) {
          const d = new Date(endDate);
          d.setDate(d.getDate() - i);
          labels.push(`${pad2(d.getMonth() + 1)}/${pad2(d.getDate())}`);
        }
        return labels;
      }

      function genTrendSeries(dayCount, start, end, wave, decimals) {
        const data = [];
        for (let i = 0; i < dayCount; i++) {
          const t = i / (dayCount - 1);
          const v = start + t * (end - start) + Math.sin(i * 0.42) * wave;
          data.push(decimals ? +v.toFixed(decimals) : Math.round(v));
        }
        return data;
      }

          const dateLabel = String(row[0]).slice(5).replace("-", "/");

            data: row.slice(3, 10).map((v) => Number(v)),

      function renderDualAxisTrendChart({
        labels,

        formatRight,
      }) {
        const W = 620,
          H = 240,

          padR = 56,
          padT = 20,
          padB = 32;
        const plotW = W - padL - padR;
        const plotH = H - padT - padB;

        const dotR = 2;
        const xPos = (i) =>
          padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW);
        const yLeft = (v) => padT + plotH * (1 - (v - leftMin) / leftRange);
        const yRight = (v) => padT + plotH * (1 - v / rightMax);
        const fmtLeft =
          formatLeft ||

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function formatDateYMD(d) {
        return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
      }

      function parseYMD(str) {
        const [y, m, d] = str.split("-").map(Number);
        return new Date(y, m - 1, d);
      }

      function eachDateInclusive(startStr, endStr) {
        const dates = [];
        const cur = parseYMD(startStr);
        const end = parseYMD(endStr);
        while (cur <= end) {
          dates.push(formatDateYMD(cur));
          cur.setDate(cur.getDate() + 1);
        }
        return dates;
      }

      function isToday(dateStr) {
        return dateStr === formatDateYMD(new Date());
      }

      /** 5 分钟粒度的数据点（分钟数 0~1400，即 00:00~23:20） */
      function generateRtSeries(metric, dateStr, dayIndex = 0) {
        const points = [];
        const isTd = isToday(dateStr);
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const dayEnd = 23 * 60 + 20;
        const endMin = isTd
          ? Math.min(Math.floor(nowMin / 5) * 5, dayEnd)
          : dayEnd;
        const seed = [...(metric + dateStr)].reduce(
          (a, c) => a + c.charCodeAt(0),
          0,
        );
        const metricSeed = [...metric].reduce((a, c) => a + c.charCodeAt(0), 0);
        const dateObj = parseYMD(dateStr);
        const dayOfWeek = dateObj.getDay();
        const baseLevel = 720 + (metricSeed % 620) + (seed % 380);
        const dayLevelShift =
          dayIndex * 95 + dayOfWeek * 48 + ((seed >> 3) % 220) - 110;
        const ampScale = 0.68 + ((seed + metricSeed) % 55) / 100;
        const phase = seed * 1.6 + dayIndex * 41 + metricSeed * 0.45;
        const wavePeriod1 = 78 + (dayOfWeek % 4) * 11 + (metricSeed % 17);
        const wavePeriod2 = 118 + (dayIndex % 5) * 9 + (seed % 23);
        let val = baseLevel + dayLevelShift;
        for (let m = 0; m <= endMin; m += 5) {
          const hour = Math.floor(m / 60);
          const nightFactor =
            hour >= 2 && hour < 6 ? 0.35 : hour >= 6 && hour < 9 ? 0.7 : 1;
          const lunchDip =
            hour >= 12 && hour < 14 ? 0.82 + (dayIndex % 3) * 0.06 : 1;
          const wave =
            Math.sin((m + phase) / wavePeriod1) * (170 * ampScale) +
            Math.cos((m + phase * 1.35) / wavePeriod2) * (95 * ampScale) +
            Math.sin((m + dayIndex * 17) / 210) * (40 + dayIndex * 8);
          val = Math.max(
            40,
            Math.min(
              2480,
              val * 0.84 +
                (baseLevel + dayLevelShift + wave) *
                  nightFactor *
                  lunchDip *
                  0.16,
            ),
          );
          points.push({ minute: m, value: Math.round(val) });
        }
        return points;
      }

      /** 取最靠近当前分钟的 step 分钟刻度 */
      function nearestStepMinute(nowMin, step) {
        return Math.round(nowMin / step) * step;
      }

      function getXTicks(dates) {
        const hasToday = dates.some(isToday);
        if (hasToday && dates.length === 1) {
          // 当天：默认 20 分钟一刻度；刻度过多（超过 X 轴可容纳数量）则改为 50 分钟
          const now = new Date();
          const nowMin = now.getHours() * 60 + now.getMinutes();
          const MAX_TICKS = 24; // X 轴可容纳的大致刻度上限

          let step = 20;
          let endTick = nearestStepMinute(nowMin, step);
          endTick = Math.max(0, Math.min(endTick, 23 * 60 + 40));
          let tickCount = Math.floor(endTick / step) + 1;
          if (tickCount > MAX_TICKS) {
            step = 50;
            endTick = nearestStepMinute(nowMin, step);
            endTick = Math.max(0, Math.min(endTick, 23 * 60 + 20));
          }

          const ticks = [];
          for (let m = 0; m <= endTick; m += step) ticks.push(m);
          if (!ticks.length) ticks.push(0);
          const maxMin = Math.max(endTick, step);
          return { ticks, maxMin, stepLabel: step };
        }
        // 非当天或跨天：00:00 起，50 分钟一刻度，到 23:20
        const ticks = [];
        for (let m = 0; m <= 23 * 60 + 20; m += 50) ticks.push(m);
        return { ticks, maxMin: 23 * 60 + 20, stepLabel: 50 };
      }

      function minuteToLabel(m) {
        return `${pad2(Math.floor(m / 60))}:${pad2(m % 60)}`;
      }

          bodyRows += `<tr class="rt-row-anim" style="animation-delay:${delay}s">`;
          bodyRows += `<td class="sticky-col-1">${minuteToLabel(m)}</td>`;
          metrics.forEach((metric) => {
