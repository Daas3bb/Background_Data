<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据后台</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <style>
      :root {
        /* Arco Design Tokens */
        --arco-primary: #165dff;
        --arco-primary-hover: #4080ff;
        --arco-primary-active: #0e42d2;
        --arco-primary-light: #e8f3ff;
        --arco-success: #00b42a;
        --arco-warning: #ff7d00;
        --arco-danger: #f53f3f;
        --arco-bg-1: #ffffff;
        --arco-bg-2: #f7f8fa;
        --arco-bg-3: #f2f3f5;
        --arco-border: #e5e6eb;
        --arco-border-2: #f2f3f5;
        --arco-text-1: #1d2129;
        --arco-text-2: #4e5969;
        --arco-text-3: #86909c;
        --arco-text-4: #c9cdd4;
        --arco-radius: 4px;
        --arco-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        --arco-shadow-light: 0 1px 2px rgba(0, 0, 0, 0.03);

        --sidebar-bg: var(--arco-bg-1);
        --sidebar-active: var(--arco-primary-light);
        --sidebar-active-text: var(--arco-primary);
        --sidebar-text: var(--arco-text-2);
        --sidebar-text-active: var(--arco-primary);
        --header-bg: var(--arco-bg-1);
        --page-bg: var(--arco-bg-2);
        --border: var(--arco-border);
        --primary: var(--arco-primary);
        --group-header: #e3ecff;
        --group-header-alt: var(--arco-bg-2);
        --text: var(--arco-text-1);
        --text-secondary: var(--arco-text-2);
        --danger: var(--arco-danger);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "PingFang SC",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Microsoft YaHei",
          Arial,
          sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--page-bg);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      /* 侧边栏 - Arco Pro 浅色导航 */
      .sidebar {
        width: 220px;
        background: var(--sidebar-bg);
        color: var(--sidebar-text);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        box-shadow: var(--arco-shadow-light);
      }

      .sidebar-logo {
        height: 60px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        gap: 10px;
      }

      .sidebar-logo-icon {
        width: 28px;
        height: 28px;
        background: var(--arco-primary);
        border-radius: var(--arco-radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        color: #fff;
        font-size: 12px;
      }

      .sidebar-logo-text {
        color: var(--arco-text-1);
        font-size: 16px;
        font-weight: 600;
      }

      .sidebar-menu {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .menu-group {
        margin-bottom: 2px;
      }

      .menu-top {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        height: 40px;
        color: var(--sidebar-text);
        cursor: pointer;
        transition: all 0.15s cubic-bezier(0.34, 0.69, 0.1, 1);
        border-radius: var(--arco-radius);
        user-select: none;
        font-weight: 400;
        font-size: 14px;
      }

      .menu-top:hover {
        color: var(--arco-text-1);
        background: var(--arco-bg-3);
      }

      .menu-top.active {
        color: var(--sidebar-active-text);
        background: var(--sidebar-active);
        font-weight: 500;
      }

      .menu-top.has-child.active:not(.expanded) {
        background: var(--sidebar-active);
        color: var(--sidebar-active-text);
        font-weight: 500;
      }

      .menu-arrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        height: 14px;
        margin-left: auto;
        font-size: 10px;
        color: var(--arco-text-3);
        transition:
          transform 0.2s cubic-bezier(0.34, 0.69, 0.1, 1),
          color 0.15s;
        flex-shrink: 0;
      }

      .menu-group.expanded .menu-arrow {
        transform: rotate(90deg);
        color: var(--arco-text-2);
      }

      .menu-top.active .menu-arrow {
        color: var(--arco-primary);
      }

      .submenu {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.25s cubic-bezier(0.34, 0.69, 0.1, 1),
          opacity 0.2s ease;
        opacity: 0;
      }

      .menu-group.expanded .submenu {
        max-height: 560px;
        opacity: 1;
      }

      .menu-child {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px 0 36px;
        height: 36px;
        color: var(--sidebar-text);
        cursor: pointer;
        transition: all 0.15s cubic-bezier(0.34, 0.69, 0.1, 1);
        border-radius: var(--arco-radius);
        user-select: none;
        font-size: 14px;
      }

      .menu-child:not(.has-child):hover {
        color: var(--arco-text-1);
        background: var(--arco-bg-3);
      }

      .menu-child.active {
        color: var(--sidebar-active-text);
        background: var(--sidebar-active);
        font-weight: 500;
      }

      .menu-child.has-child.active:not(.expanded) {
        background: var(--sidebar-active);
        color: var(--sidebar-active-text);
        font-weight: 500;
      }

      .menu-child .menu-arrow {
        width: 12px;
        height: 12px;
        font-size: 9px;
      }

      .menu-sub-group.expanded > .menu-child .menu-arrow {
        transform: rotate(90deg);
        color: var(--arco-text-2);
      }

      .submenu-inner {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.25s cubic-bezier(0.34, 0.69, 0.1, 1),
          opacity 0.2s ease;
        opacity: 0;
      }

      .menu-sub-group.expanded .submenu-inner {
        max-height: 280px;
        opacity: 1;
      }

      .menu-grandchild {
        display: block;
        padding: 0 12px 0 52px;
        height: 36px;
        line-height: 36px;
        color: var(--sidebar-text);
        cursor: pointer;
        transition: all 0.15s cubic-bezier(0.34, 0.69, 0.1, 1);
        border-radius: var(--arco-radius);
        user-select: none;
        font-size: 14px;
      }

      .menu-grandchild:hover {
        color: var(--arco-text-1);
        background: var(--arco-bg-3);
      }

      .menu-grandchild.active {
        color: var(--sidebar-active-text);
        background: var(--sidebar-active);
        font-weight: 500;
      }

      /* 子菜单组（同一 submenu-inner 展开时）的选项淡底，用于区分同组层级 */
      .menu-sub-group.expanded .menu-grandchild:not(.active):not(:hover) {
        background: var(--arco-bg-2);
      }

      .sidebar-footer {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--arco-primary-light);
        color: var(--arco-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        flex-shrink: 0;
      }

      .user-meta {
        flex: 1;
        min-width: 0;
      }
      .user-info {
        color: var(--arco-text-3);
        font-size: 12px;
      }
      .user-name {
        color: var(--arco-text-1);
        font-size: 14px;
        font-weight: 500;
      }

      .btn-logout {
        padding: 0 12px;
        height: 28px;
        background: var(--arco-bg-1);
        border: 1px solid var(--border);
        color: var(--arco-text-2);
        border-radius: var(--arco-radius);
        cursor: pointer;
        font-size: 12px;
        transition: all 0.15s;
        flex-shrink: 0;
      }

      .btn-logout:hover {
        color: var(--arco-primary);
        border-color: var(--arco-primary);
        background: var(--arco-primary-light);
      }

      /* 主内容区 */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .top-header {
        height: 60px;
        background: var(--header-bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        justify-content: space-between;
        flex-shrink: 0;
        box-shadow: var(--arco-shadow-light);
      }

      .breadcrumb {
        color: var(--arco-text-3);
        font-size: 14px;
      }
      .breadcrumb strong {
        color: var(--arco-text-1);
        font-weight: 500;
        margin-left: 4px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 16px;
        color: var(--arco-text-2);
        font-size: 13px;
      }

      .header-badge {
        padding: 2px 8px;
        border-radius: 10px;
        background: var(--arco-primary-light);
        color: var(--arco-primary);
        font-size: 12px;
        font-weight: 500;
      }

      .content {
        flex: 1;
        padding: 16px 20px 20px;
        overflow: auto;
      }

      .page-panel {
        background: var(--arco-bg-1);
        border-radius: var(--arco-radius);
        border: 1px solid var(--border);
        display: none;
        box-shadow: var(--arco-shadow-light);
      }

      .page-panel.active {
        display: block;
      }

      /* 筛选区 - Arco Form */
      .filter-bar {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px 24px;
        background: var(--arco-bg-1);
      }

      .filter-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .filter-item label {
        color: var(--arco-text-2);
        white-space: nowrap;
        font-size: 14px;
      }

      .filter-item select,
      .filter-item input[type="date"],
      .filter-item input[type="text"] {
        height: 32px;
        padding: 0 12px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        font-size: 14px;
        min-width: 160px;
        color: var(--arco-text-1);
        background: var(--arco-bg-1);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        outline: none;
      }

      .filter-item select:hover,
      .filter-item input[type="date"]:hover,
      .filter-item input[type="text"]:hover {
        border-color: var(--arco-primary);
      }

      .filter-item select:focus,
      .filter-item input[type="date"]:focus,
      .filter-item input[type="text"]:focus {
        border-color: var(--arco-primary);
        box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1);
      }

      .filter-item-channel-name {
        display: none;
      }

      .filter-item-channel-name.is-visible {
        display: flex;
      }

      /* Arco Button */
      .btn {
        height: 32px;
        padding: 0 16px;
        border-radius: var(--arco-radius);
        border: 1px solid var(--border);
        background: var(--arco-bg-1);
        cursor: pointer;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--arco-text-1);
        transition: all 0.15s cubic-bezier(0.34, 0.69, 0.1, 1);
      }

      .btn:hover {
        border-color: var(--arco-primary);
        color: var(--arco-primary);
        background: var(--arco-bg-1);
      }

      .btn-primary {
        background: var(--arco-primary);
        border-color: var(--arco-primary);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--arco-primary-hover);
        border-color: var(--arco-primary-hover);
        color: #fff;
      }

      .toolbar {
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
        background: var(--arco-bg-1);
      }

      .page-title {
        font-size: 16px;
        font-weight: 500;
        color: var(--arco-text-1);
      }

      /* 表格 */
      .table-wrap {
        overflow: auto;
        max-height: calc(100vh - 320px);
        position: relative;
      }

      table.data-table {
        border-collapse: separate;
        border-spacing: 0;
        width: max-content;
        min-width: 100%;
        font-size: 13px;
        --sticky-col-1-width: 112px;
        --sticky-col-2-width: 96px;
        --sticky-col-3-width: 96px;
        --sticky-col-4-width: 100px;
        --sticky-total-width: calc(
          var(--sticky-col-1-width) + var(--sticky-col-2-width) +
            var(--sticky-col-3-width) + var(--sticky-col-4-width)
        );
        --group-row-height: 37px;
      }

      .data-table th,
      .data-table td {
        border: none;
        border-bottom: 1px solid var(--border);
        padding: 10px 16px;
        text-align: center;
        white-space: nowrap;
      }

      .data-table thead th {
        background: var(--arco-bg-3);
        font-weight: 500;
        position: sticky;
        top: 0;
        z-index: 2;
        color: var(--arco-text-1);
        font-size: 14px;
      }

      .data-table thead tr.group-row th {
        top: 0;
        font-weight: 600;
        font-size: 12px;
        height: var(--group-row-height);
      }

      .data-table thead tr.col-row th {
        top: var(--group-row-height);
        font-weight: 500;
        font-size: 12px;
      }

      .data-table thead tr.col-row th .sort-icon {
        display: inline-flex;
        flex-direction: column;
        margin-left: 4px;
        vertical-align: middle;
        line-height: 0.6;
        font-size: 8px;
        color: var(--arco-text-4);
        cursor: pointer;
      }

      .data-table thead tr.col-row th .sort-icon:hover {
        color: var(--arco-primary);
      }

      .data-table tbody tr {
        transition: background 0.15s;
      }
      .data-table tbody tr:hover {
        background: var(--arco-bg-2);
      }

      .data-table tbody td {
        color: var(--arco-text-1);
        background: var(--arco-bg-1);
      }
      .data-table tbody tr:nth-child(even) td {
        background: var(--arco-bg-2);
      }
      .data-table tbody tr:nth-child(even) [class*="sticky-col-"] {
        background: var(--arco-bg-2);
      }
      .data-table tbody tr:hover td,
      .data-table tbody tr:hover [class*="sticky-col-"] {
        background: #e8f3ff;
      }

      /* 固定列：日期、来源渠道、渠道名、所属平台 */
      .data-table [class*="sticky-col-"] {
        position: sticky;
        background-clip: padding-box;
      }

      .data-table .sticky-col-1 {
        left: 0;
        min-width: var(--sticky-col-1-width);
        max-width: var(--sticky-col-1-width);
        z-index: 1;
        background: var(--arco-bg-1);
      }

      .data-table .sticky-col-2 {
        left: var(--sticky-col-1-width);
        min-width: var(--sticky-col-2-width);
        max-width: var(--sticky-col-2-width);
        z-index: 1;
        background: var(--arco-bg-1);
      }

      .data-table .sticky-col-3 {
        left: calc(var(--sticky-col-1-width) + var(--sticky-col-2-width));
        min-width: var(--sticky-col-3-width);
        max-width: var(--sticky-col-3-width);
        z-index: 1;
        background: var(--arco-bg-1);
      }

      .data-table tbody tr:nth-child(even) .sticky-col-1,
      .data-table tbody tr:nth-child(even) .sticky-col-2,
      .data-table tbody tr:nth-child(even) .sticky-col-3 {
        background: var(--arco-bg-2);
      }

      .data-table .sticky-col-4 {
        left: calc(
          var(--sticky-col-1-width) + var(--sticky-col-2-width) +
            var(--sticky-col-3-width)
        );
        min-width: var(--sticky-col-4-width);
        max-width: var(--sticky-col-4-width);
        z-index: 1;
        background: var(--arco-bg-1);
        box-shadow: 4px 0 8px -4px rgba(29, 33, 41, 0.08);
      }

      .data-table tbody tr:nth-child(even) .sticky-col-4 {
        background: var(--arco-bg-2);
      }

      .data-table tbody tr:hover [class*="sticky-col-"] {
        background: #e8f3ff;
      }

      /* 表头固定列（纵向 + 横向） */
      .data-table thead [class*="sticky-col-"] {
        z-index: 4;
        background: var(--arco-bg-3);
      }

      .data-table thead tr.group-row .sticky-group-head {
        position: sticky;
        left: 0;
        top: 0;
        z-index: 6;
        min-width: var(--sticky-total-width);
        box-shadow: 4px 0 8px -4px rgba(29, 33, 41, 0.08);
      }

      .data-table thead tr.col-row [class*="sticky-col-"] {
        z-index: 5;
      }

      /* 分组表头：Arco 主色间隔区分 */
      .data-table thead tr.group-row th:nth-child(odd) {
        background: var(--group-header) !important;
      }

      .data-table thead tr.group-row th:nth-child(even) {
        background: var(--group-header-alt) !important;
      }

      /* 分页 - Arco Pagination */
      .pagination {
        padding: 12px 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        border-top: 1px solid var(--border);
        background: var(--arco-bg-1);
      }

      .pagination button {
        min-width: 32px;
        height: 32px;
        border: 1px solid var(--border);
        background: var(--arco-bg-1);
        border-radius: var(--arco-radius);
        cursor: pointer;
        font-size: 14px;
        color: var(--arco-text-1);
        transition: all 0.15s;
      }

      .pagination button:hover:not(:disabled) {
        border-color: var(--arco-primary);
        color: var(--arco-primary);
      }

      .pagination button.active {
        background: var(--arco-primary);
        border-color: var(--arco-primary);
        color: #fff;
      }

      .pagination button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        color: var(--arco-text-4);
      }

      .pagination-info {
        margin-left: 8px;
        color: var(--arco-text-3);
        font-size: 14px;
      }

      /* 经营总览 - Arco Statistic / Card */
      .overview-insights {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 16px;
      }

      .overview-insights .metric-card {
        min-height: 128px;
        padding: 16px 18px;
      }

      .overview-insights .metric-module {
        display: inline-flex;
        align-items: center;
        height: 20px;
        padding: 0 8px;
        margin-bottom: 6px;
        border-radius: 2px;
        font-size: 12px;
        font-weight: 500;
        color: var(--arco-primary);
        background: var(--arco-primary-light);
      }

      .overview-insights .metric-compares {
        margin-top: 10px;
        display: grid;
        gap: 4px;
      }

      .overview-insights .metric-compare {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        color: var(--arco-text-3);
        line-height: 1.4;
      }

      .overview-insights .metric-compare .cmp-label {
        flex-shrink: 0;
        margin-right: 8px;
      }

      .overview-insights .metric-compare .cmp-value {
        font-variant-numeric: tabular-nums;
        font-weight: 500;
      }

      .overview-insights .metric-compare.up .cmp-value {
        color: var(--arco-success);
      }
      .overview-insights .metric-compare.down .cmp-value {
        color: var(--arco-danger);
      }
      .overview-insights .metric-compare.flat .cmp-value {
        color: var(--arco-text-3);
      }

      /* 分时数据对比 */
      .realtime-panel {
        background: var(--arco-bg-1);
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        box-shadow: var(--arco-shadow-light);
        margin-bottom: 16px;
        padding: 16px 20px 20px;
      }
      .realtime-panel-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .realtime-panel-head .chart-title {
        margin: 0;
      }
      .realtime-refresh {
        border: none;
        background: transparent;
        color: var(--arco-text-3);
        cursor: pointer;
        font-size: 14px;
        padding: 2px 4px;
        line-height: 1;
      }
      .realtime-refresh:hover {
        color: var(--arco-primary);
      }
      .realtime-filters {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .ms-wrap {
        position: relative;
        flex: 1;
        min-width: 280px;
        max-width: 520px;
      }
      .ms-trigger {
        min-height: 36px;
        width: 100%;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 4px 32px 4px 8px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        cursor: pointer;
        position: relative;
      }
      .ms-trigger:hover {
        border-color: var(--arco-primary);
      }
      .ms-trigger.open {
        border-color: var(--arco-primary);
        box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.15);
      }
      .ms-trigger::after {
        content: "▾";
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--arco-text-3);
        font-size: 12px;
      }
      .ms-placeholder {
        color: var(--arco-text-3);
        font-size: 13px;
        padding: 2px 4px;
      }
      .ms-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        height: 24px;
        padding: 0 8px;
        background: var(--arco-bg-3);
        border-radius: 4px;
        font-size: 12px;
        color: var(--arco-text-1);
      }
      .ms-tag button {
        border: none;
        background: transparent;
        color: var(--arco-text-3);
        cursor: pointer;
        font-size: 12px;
        padding: 0;
        line-height: 1;
      }
      .ms-tag button:hover {
        color: var(--arco-danger, #f53f3f);
      }
      .ms-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        z-index: 30;
        max-height: 320px;
        overflow: auto;
        background: var(--arco-bg-1);
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        box-shadow: 0 4px 16px rgba(29, 33, 41, 0.12);
        padding: 8px 0;
      }
      .ms-dropdown.open {
        display: block;
      }
      .ms-group-title {
        padding: 8px 14px 4px;
        font-size: 12px;
        font-weight: 600;
        color: var(--arco-text-3);
      }
      .ms-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        font-size: 13px;
        color: var(--arco-text-1);
        cursor: pointer;
      }
      .ms-option:hover {
        background: var(--arco-bg-2);
      }
      .ms-option input {
        accent-color: var(--arco-primary);
      }
      .realtime-date-range {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--arco-text-2);
      }
      .realtime-date-range input[type="date"] {
        height: 36px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        background: var(--arco-bg-1);
        color: var(--arco-text-1);
        font-size: 13px;
      }
      .realtime-chart-wrap {
        position: relative;
        width: 100%;
        height: 320px;
      }
      .realtime-chart-wrap svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .rt-axis {
        font-size: 11px;
        fill: var(--arco-text-3);
      }
      .rt-grid {
        stroke: var(--border);
        stroke-width: 1;
      }
      .rt-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        margin-bottom: 8px;
        font-size: 12px;
        color: var(--arco-text-2);
      }
      .rt-legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .rt-legend i {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }
      .rt-tooltip {
        position: absolute;
        pointer-events: none;
        display: none;
        min-width: 160px;
        padding: 10px 12px;
        background: rgba(29, 33, 41, 0.88);
        color: #fff;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.6;
        z-index: 20;
        transform: translate(-50%, -110%);
        white-space: nowrap;
      }
      .rt-tooltip .rt-tip-time {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .rt-tooltip .rt-tip-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .rt-tooltip .rt-tip-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .rt-crosshair {
        stroke: var(--arco-primary);
        stroke-width: 1;
        stroke-dasharray: 3 3;
        pointer-events: none;
      }

      .metric-card,
      .chart-card {
        background: var(--arco-bg-1);
        border: 1px solid var(--border);
        border-radius: var(--arco-radius);
        box-shadow: var(--arco-shadow-light);
      }

      .metric-card {
        padding: 20px;
        min-height: 108px;
      }

      .metric-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--arco-text-2);
        font-size: 14px;
      }

      .metric-value {
        margin-top: 8px;
        color: var(--arco-text-1);
        font-size: 24px;
        line-height: 32px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .metric-trend {
        margin-top: 8px;
        color: var(--arco-text-3);
        font-size: 12px;
      }

      .metric-trend.up {
        color: var(--arco-success);
      }
      .metric-trend.down {
        color: var(--arco-danger);
      }

      .metric-hint {
        margin-top: 2px;
        font-size: 12px;
        color: var(--arco-text-3);
        line-height: 1.4;
      }

      .kpi-grid.cols-8 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      /* 付费转化漏斗（纵向） */
      .pay-funnel {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .pay-funnel-step {
        width: 100%;
        max-width: 360px;
        text-align: center;
        padding: 16px 20px;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        border-radius: 4px;
      }
      .pay-funnel-step:nth-child(1) {
        background: #165dff;
      }
      .pay-funnel-step:nth-child(3) {
        background: #4080ff;
        width: 72%;
      }
      .pay-funnel-step:nth-child(5) {
        background: #6aa1ff;
        width: 56%;
        color: var(--arco-text-1);
      }
      .pay-funnel-step small {
        display: block;
        margin-top: 6px;
        font-size: 20px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .pay-funnel-rate {
        padding: 10px 0;
        color: var(--arco-text-2);
        font-size: 13px;
        font-weight: 500;
      }

      .status-tag {
        display: inline-flex;
        align-items: center;
        padding: 0 8px;
        height: 20px;
        border-radius: 2px;
        font-size: 12px;
        font-weight: 500;
      }

      .status-tag.success {
        color: var(--arco-success);
        background: #e8ffea;
      }
      .status-tag.warning {
        color: var(--arco-warning);
        background: #fff7e8;
      }
      .status-tag.danger {
        color: var(--arco-danger);
        background: #ffece8;
      }
      .status-tag.info {
        color: var(--arco-primary);
        background: var(--arco-primary-light);
      }

      .chart-grid {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }

      .chart-card {
        padding: 20px;
        min-height: 220px;
      }

      .chart-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--arco-text-1);
        font-size: 14px;
        font-weight: 500;
      }

      .chart-subtitle {
        margin-top: 4px;
        color: var(--arco-text-3);
        font-size: 12px;
      }

      .chart-bars {
        height: 120px;
        margin-top: 16px;
        display: flex;
        align-items: end;
        gap: 8px;
        padding: 0 4px;
        border-bottom: 1px solid var(--border);
      }

      .chart-bar {
        flex: 1;
        min-width: 12px;
        border-radius: 2px 2px 0 0;
        background: var(--arco-primary);
        opacity: 0.85;
      }

      .chart-legend {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        color: var(--arco-text-3);
        font-size: 12px;
      }

      .insight-list {
        margin-top: 16px;
        display: grid;
        gap: 0;
      }
      .insight-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--arco-border-2);
        color: var(--arco-text-2);
        font-size: 14px;
      }

      .insight-row:last-child {
        border-bottom: 0;
      }
      .insight-row strong {
        color: var(--arco-text-1);
        font-weight: 500;
      }

      .table-wrap::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .table-wrap::-webkit-scrollbar-thumb {
        border-radius: 3px;
        background: var(--arco-text-4);
      }

      .data-table thead tr.group-row th {
        color: var(--arco-text-1);
        font-weight: 500;
      }

      .data-table thead tr.col-row th {
        color: var(--arco-text-2);
        font-weight: 400;
        font-size: 13px;
      }

      .data-table td:first-child {
        color: var(--arco-text-2);
        font-variant-numeric: tabular-nums;
      }

      .table-wrap {
        max-height: calc(100vh - 340px);
      }

      /* 用户增长分析模块 */
      .analysis-block {
        margin-bottom: 16px;
      }
      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        color: var(--arco-text-1);
        font-size: 16px;
        font-weight: 500;
      }
      .section-heading .hint {
        color: var(--arco-text-3);
        font-size: 12px;
        font-weight: 400;
      }
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 16px;
      }
      .kpi-grid.cols-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .compare-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        margin-top: 12px;
      }
      .compare-table th,
      .compare-table td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }
      .compare-table th {
        background: var(--arco-bg-3);
        color: var(--arco-text-2);
        font-weight: 500;
      }
      .compare-table td {
        color: var(--arco-text-1);
      }
      .delta-up {
        color: var(--arco-success);
        font-weight: 500;
      }
      .delta-down {
        color: var(--arco-danger);
        font-weight: 500;
      }

      .line-chart {
        height: 140px;
        margin-top: 16px;
        position: relative;
        border-bottom: 1px solid var(--border);
        background: repeating-linear-gradient(
          to top,
          transparent 0,
          transparent 34px,
          var(--arco-border-2) 35px
        );
      }
      .line-chart svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .line-legend {
        display: flex;
        gap: 16px;
        margin-top: 10px;
        font-size: 12px;
        color: var(--arco-text-3);
      }
      .line-legend i {
        display: inline-block;
        width: 12px;
        height: 3px;
        border-radius: 2px;
        margin-right: 6px;
        vertical-align: middle;
      }

      .pie-wrap {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-top: 16px;
        min-height: 160px;
      }
      .pie-chart {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: conic-gradient(
          #165dff 0 45%,
          #14c9c9 45% 75%,
          #f7ba1e 75% 100%
        );
        position: relative;
        flex-shrink: 0;
      }
      .pie-chart::after {
        content: "";
        position: absolute;
        inset: 28px;
        border-radius: 50%;
        background: var(--arco-bg-1);
      }
      .pie-legend {
        flex: 1;
        display: grid;
        gap: 10px;
      }
      .pie-legend-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        color: var(--arco-text-2);
      }
      .pie-legend-item .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 8px;
        display: inline-block;
      }
      .pie-legend-item strong {
        color: var(--arco-text-1);
        font-weight: 500;
      }

      .hbar-list {
        margin-top: 16px;
        display: grid;
        gap: 14px;
      }
      .hbar-row {
        display: grid;
        grid-template-columns: 72px 1fr 56px;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--arco-text-2);
      }
      .hbar-track {
        height: 18px;
        background: var(--arco-bg-3);
        border-radius: 2px;
        overflow: hidden;
      }
      .hbar-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #4080ff, #165dff);
      }
      .hbar-row strong {
        text-align: right;
        color: var(--arco-text-1);
        font-variant-numeric: tabular-nums;
      }

      .funnel {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .funnel-step {
        width: 100%;
        max-width: 420px;
        text-align: center;
        padding: 14px 16px;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        clip-path: polygon(4% 0, 96% 0, 100% 100%, 0 100%);
      }
      .funnel-step:nth-child(1) {
        background: #165dff;
        width: 100%;
        clip-path: polygon(0 0, 100% 0, 96% 100%, 4% 100%);
      }
      .funnel-step:nth-child(3) {
        background: #4080ff;
        width: 86%;
        clip-path: polygon(2% 0, 98% 0, 94% 100%, 6% 100%);
      }
      .funnel-step:nth-child(5) {
        background: #6aa1ff;
        width: 70%;
        clip-path: polygon(4% 0, 96% 0, 92% 100%, 8% 100%);
      }
      .funnel-step:nth-child(7) {
        background: #94bfff;
        width: 56%;
        color: var(--arco-text-1);
        clip-path: polygon(6% 0, 94% 0, 90% 100%, 10% 100%);
      }
      .funnel-rate {
        padding: 6px 0;
        color: var(--arco-text-3);
        font-size: 12px;
      }
      .funnel-step small {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        font-weight: 400;
        opacity: 0.9;
      }

      .vbar-compare {
        height: 160px;
        margin-top: 16px;
        display: flex;
        align-items: end;
        justify-content: space-around;
        gap: 20px;
        border-bottom: 1px solid var(--border);
        padding: 0 12px;
      }
      .vbar-item {
        flex: 1;
        max-width: 80px;
        text-align: center;
      }
      .vbar-item .bar {
        height: var(--h, 50%);
        margin: 0 auto 8px;
        width: 36px;
        border-radius: 2px 2px 0 0;
        background: var(--arco-primary);
      }
      .vbar-item .label {
        font-size: 12px;
        color: var(--arco-text-3);
      }
      .vbar-item .val {
        font-size: 13px;
        color: var(--arco-text-1);
        font-weight: 500;
        margin-bottom: 4px;
      }

      /* 表格 / 图表 视图切换 */
      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .view-toggle {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }
      .view-toggle .vt-btn {
        padding: 6px 16px;
        background: var(--arco-bg-1);
        border: none;
        cursor: pointer;
        font-size: 13px;
        color: var(--arco-text-2);
        transition:
          background 0.15s,
          color 0.15s;
      }
      .view-toggle .vt-btn + .vt-btn {
        border-left: 1px solid var(--border);
      }
      .view-toggle .vt-btn:hover {
        background: var(--arco-bg-3);
      }
      .view-toggle .vt-btn.active {
        background: var(--arco-primary);
        color: #fff;
      }

      .chart-range-toggle .vt-btn {
        padding: 4px 10px;
        font-size: 12px;
      }

      .chart-range-toggle {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }

      .chart-range-toggle .range-btn {
        padding: 4px 10px;
        background: var(--arco-bg-1);
        border: none;
        cursor: pointer;
        font-size: 12px;
        color: var(--arco-text-2);
        transition:
          background 0.15s,
          color 0.15s;
      }

      .chart-range-toggle .range-btn + .range-btn {
        border-left: 1px solid var(--border);
      }

      .chart-range-toggle .range-btn:hover {
        background: var(--arco-bg-3);
      }

      .chart-range-toggle .range-btn.active {
        background: var(--arco-primary);
        color: #fff;
      }

      .chart-title-text {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .chart-view {
        padding: 20px;
      }
      .chart-view .chart-grid {
        margin-bottom: 16px;
      }

      /* 双轴组合图 */
      .combo-chart {
        margin-top: 16px;
        width: 100%;
      }
      .combo-chart svg {
        width: 100%;
        height: auto;
        display: block;
      }
      .combo-chart .axis-label {
        font-size: 8px;
        fill: var(--arco-text-3);
      }
      .combo-chart .axis-title {
        font-size: 8px;
        fill: var(--arco-text-2);
        font-weight: 500;
      }
      .combo-chart .funnel-axis {
        font-size: 8px;
        fill: var(--arco-text-3);
        font-variant-numeric: tabular-nums;
      }
      .grid-line {
        stroke: var(--border);
        stroke-width: 1;
      }

      /* GA4 风格分步漏斗图 */
      .ga-funnel {
        margin-top: 16px;
        width: 100%;
      }
      .ga-funnel svg {
        width: 100%;
        height: auto;
        display: block;
      }
      .ga-funnel .grid-line.dashed {
        stroke-dasharray: 4 4;
      }
      .ga-funnel .funnel-axis {
        font-size: 10px;
        fill: var(--arco-text-3);
        font-variant-numeric: tabular-nums;
      }
      .ga-funnel .funnel-step-idx {
        font-size: 11px;
        fill: var(--arco-text-3);
      }
      .ga-funnel .funnel-step-name {
        font-size: 10px;
        font-weight: 400;
        fill: var(--arco-text-1);
      }
      .ga-funnel .funnel-comp {
        font-size: 10px;
        font-weight: 300;
        fill: var(--arco-text-1);
      }
      .ga-funnel .funnel-abandon-title {
        font-size: 11px;
        fill: var(--arco-text-3);
      }
      .ga-funnel .funnel-abandon {
        font-size: 11px;
        fill: var(--arco-text-2);
        font-variant-numeric: tabular-nums;
      }

      /* 渠道排行榜 */
      .rank-list {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }
      .rank-head,
      .rank-row {
        display: grid;
        grid-template-columns: 88px 1fr 56px;
        align-items: center;
        gap: 12px;
        font-size: 13px;
      }
      .rank-head {
        color: var(--arco-text-3);
        font-size: 12px;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--border);
      }
      .rank-head span:nth-child(2) {
        text-align: left;
      }
      .rank-head span:last-child {
        text-align: right;
      }
      .rank-name {
        color: var(--arco-text-1);
        font-weight: 500;
      }
      .rank-bar {
        height: 20px;
        background: var(--arco-bg-3);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .rank-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #4080ff, #165dff);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 8px;
        color: #fff;
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        min-width: 40px;
      }
      .rank-rate {
        text-align: right;
        color: var(--arco-text-1);
        font-weight: 500;
        font-variant-numeric: tabular-nums;
      }

      @media (max-width: 1180px) {
        .overview-insights {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .chart-grid {
          grid-template-columns: 1fr;
        }
        .kpi-grid,
        .kpi-grid.cols-4 {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
      }

      @media (max-width: 820px) {
        .sidebar {
          width: 200px;
        }
        .content {
          padding: 12px;
        }
        .overview-insights {
          gap: 12px;
        }
      }

      @media (max-width: 620px) {
        .layout {
          display: block;
        }
        .sidebar {
          width: 100%;
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }
        .sidebar-menu {
          max-height: 200px;
        }

        const plotW = W - padL - padR;
        const plotH = H - padT - padB;
        const n = labels.length;
        const step = plotW / n;
        const leftMax = 14000;
        const rightMax = 100;
        const barW = 15,
          gap = 4;
        const yCount = (v) => padT + plotH * (1 - v / leftMax);
        const yPct = (v) => padT + plotH * (1 - v / rightMax);

        let grid = "",
          leftAxis = "",
          rightAxis = "";
        for (let i = 0; i <= 4; i++) {
          const y = padT + (plotH / 4) * i;
          grid += `<line class="grid-line" x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}"></line>`;
          leftAxis += `<text class="axis-label" x="${padL - 8}" y="${y + 3}" text-anchor="end">${(leftMax - (leftMax / 4) * i).toLocaleString("zh-CN")}</text>`;
          rightAxis += `<text class="axis-label" x="${W - padR + 8}" y="${y + 3}" text-anchor="start">${rightMax - (rightMax / 4) * i}%</text>`;
        }

        let bars = "",
          xLabels = "",
          linePts = [],
          dots = "";
        labels.forEach((lab, i) => {
          const cx = padL + step * i + step / 2;
          const x1 = cx - barW - gap / 2;
          const x2 = cx + gap / 2;
          bars += `<rect x="${x1}" y="${yCount(install[i])}" width="${barW}" height="${(plotH * install[i]) / leftMax}" rx="3" fill="#165DFF"></rect>`;
          bars += `<rect x="${x2}" y="${yCount(newUsers[i])}" width="${barW}" height="${(plotH * newUsers[i]) / leftMax}" rx="3" fill="#14C9C9"></rect>`;
          const ly = yPct(convRate[i]);
          linePts.push(`${cx},${ly}`);
          dots += `<circle cx="${cx}" cy="${ly}" r="3.5" fill="#fff" stroke="#F7BA1E" stroke-width="2"></circle>`;
          xLabels += `<text class="axis-label" x="${cx}" y="${H - padB + 18}" text-anchor="middle">${lab}</text>`;
        });

        return `
        <div class="combo-chart">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
            ${grid}
            ${bars}
            <polyline fill="none" stroke="#F7BA1E" stroke-width="2.5" points="${linePts.join(" ")}"></polyline>
            ${dots}
            ${leftAxis}
            ${rightAxis}
            ${xLabels}
          </svg>
        </div>
        <div class="line-legend">
          <span><i style="background:#165DFF"></i>安装人数</span>

      function renderFunnelChart(steps) {
        steps = steps || [
          { name: "安装用户", value: 100000 },
          { name: "新增设备", value: 80000 },
          { name: "注册用户", value: 50000 },
          { name: "绑定用户", value: 45000 },
        ];
        const W = 760,
          H = 356;
        const plotTop = 66,
          plotBottom = 270;
        const plotH = plotBottom - plotTop;
        const axisLeft = 46,
          plotRight = W - 14;
        const plotLeft = axisLeft;
        const plotW = plotRight - plotLeft;
        const n = steps.length;
        const colW = plotW / n;
        const darkW = colW * 0.58;
        const maxVal = Math.max(...steps.map((s) => s.value), 1);
        const yVal = (v) => plotBottom - plotH * (v / maxVal);
        const fmt = (v) => {
          if (v === 0) return "0";
          if (v >= 10000)
            return (
              (v % 10000 === 0 ? v / 10000 : (v / 10000).toFixed(1)) + "万"
            );
          return v.toLocaleString("zh-CN");
        };
        const nameFont = n > 5 ? 11 : 13;

        let grid = "",
          yLabels = "";
        [0, 0.5, 1].forEach((t) => {
          const y = plotBottom - plotH * t;
          grid += `<line class="grid-line dashed" x1="${plotLeft}" y1="${y}" x2="${plotRight}" y2="${y}"></line>`;
          yLabels += `<text class="funnel-axis" x="${plotLeft - 8}" y="${y + 4}" text-anchor="end">${fmt(maxVal * t)}</text>`;
        });

        let seps = "",
          bars = "",
          headers = "",
          abandons = "";
        seps += `<line class="grid-line" x1="${plotLeft}" y1="16" x2="${plotLeft}" y2="${plotBottom}"></line>`;
        steps.forEach((s, i) => {
          const colX = plotLeft + colW * i;
          const sepX = colX + colW;
          const topY = yVal(s.value);
          bars += `<rect x="${colX}" y="${topY}" width="${darkW}" height="${plotBottom - topY}" fill="#4080FF"></rect>`;
          if (i < n - 1) {
            const nextTopY = yVal(steps[i + 1].value);
            const lx = colX + darkW,
              rx = colX + colW;
            bars += `<polygon points="${lx},${topY} ${rx},${nextTopY} ${rx},${plotBottom} ${lx},${plotBottom}" fill="#C9DCFF"></polygon>`;
          }
          seps += `<line class="grid-line dashed" x1="${sepX}" y1="16" x2="${sepX}" y2="${plotBottom}"></line>`;

          const comp = i === 0 ? 100 : (s.value / steps[i - 1].value) * 100;
          headers += `<text class="funnel-step-idx" x="${colX + 4}" y="30">Step ${i + 1}</text>`;
          headers += `<text class="funnel-step-name" x="${colX + 4}" y="52" style="font-size:${nameFont}px">${s.name}</text>`;
          headers += `<text class="funnel-comp" x="${sepX - 6}" y="52" text-anchor="end" style="font-size:${nameFont}px">${comp.toFixed(1)}%</text>`;

          if (i < n - 1) {
            const lost = s.value - steps[i + 1].value;
            const rate = (lost / s.value) * 100;
            const ay = plotBottom + 30;
            headers += `<text class="funnel-abandon-title" x="${colX + 4}" y="${ay - 16}">流失率</text>`;
            abandons += `<rect x="${colX + 4}" y="${ay - 9}" width="9" height="9" rx="2" fill="#4080FF"></rect>`;
            abandons += `<text class="funnel-abandon" x="${colX + 18}" y="${ay}">${fmt(Math.max(lost, 0))} · ${rate.toFixed(1)}%</text>`;
          }
        });

        return `
        <div class="ga-funnel">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
            ${grid}
            ${bars}
            ${seps}
            ${headers}
            ${yLabels}
            ${abandons}
          </svg>
        </div>`;
      }

      function buildRecentTrendLabels(dayCount = 30) {
        const labels = [];
        for (let i = 0; i < dayCount; i++) {
          const d = new Date(2025, 5, 18 + i);
          labels.push(`${pad2(d.getMonth() + 1)}/${pad2(d.getDate())}`);
        }
        return labels;
      }

      function buildTrendLabelsBeforeEnd(dayCount, endDate = new Date(2025, 6, 17)) {
        const labels = [];
        for (let i = dayCount - 1; i >= 0; i--) {
          const d = new Date(endDate);
          d.setDate(d.getDate() - i);
          labels.push(`${pad2(d.getMonth() + 1)}/${pad2(d.getDate())}`);
        }
        return labels;
      }

      function genTrendSeries(dayCount, start, end, wave, decimals) {
        const data = [];
        for (let i = 0; i < dayCount; i++) {
          const t = i / (dayCount - 1);
          const v = start + t * (end - start) + Math.sin(i * 0.42) * wave;
          data.push(decimals ? +v.toFixed(decimals) : Math.round(v));
        }
        return data;
      }

      const LTV_COHORT_COLORS = [

        "#F5319D",

      const LTV_DX_LABELS = ["D1", "D2", "D3", "D4", "D5", "D6", "D7"];

      function buildLtvCohortSeries(page) {
        return page.sampleData.map((row, idx) => {
          const dateLabel = String(row[0]).slice(5).replace("-", "/");
          return {
            name: `${dateLabel} ${row[1]}`,
            data: row.slice(3, 10).map((v) => Number(v)),
            color: LTV_COHORT_COLORS[idx % LTV_COHORT_COLORS.length],
          };
        });
      }

          yLabels += `<text class="funnel-axis" x="${padL - 8}" y="${y + 4}" text-anchor="end">${fmtAxis(v)}</text>`;

          xLabels += `<text class="funnel-axis" x="${xPos(i)}" y="${H - 8}" text-anchor="middle">${lab}</text>`;
        });

        let polylines = "",

      function renderDualAxisTrendChart({
        labels,
        leftSeries,
        rightSeries,
        leftMin = 0,
        leftMax,
        rightMax,
        leftStep,
        formatLeft,
        formatRight,
      }) {
        const W = 620,
          H = 240,
          padL = 52,
          padR = 56,
          padT = 20,
          padB = 32;
        const plotW = W - padL - padR;
        const plotH = H - padT - padB;
        const leftRange = leftMax - leftMin;
        const n = labels.length;
        const dotR = 2;
        const xPos = (i) =>
          padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW);
        const yLeft = (v) => padT + plotH * (1 - (v - leftMin) / leftRange);
        const yRight = (v) => padT + plotH * (1 - v / rightMax);
        const fmtLeft =
          formatLeft ||
          ((v) =>
            Number.isInteger(v) ? v.toLocaleString("zh-CN") : v.toFixed(1));
        const fmtRight = formatRight || fmtLeft;

        let grid = "",
          leftAxis = "",
          rightAxis = "";
        if (leftStep) {
          for (let v = leftMin; v <= leftMax; v += leftStep) {
            const y = yLeft(v);
            grid += `<line class="grid-line" x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}"></line>`;
            leftAxis += `<text class="axis-label" x="${padL - 8}" y="${y + 3}" text-anchor="end">${fmtLeft(v)}</text>`;
            const rightVal = rightMax * ((v - leftMin) / leftRange);
            rightAxis += `<text class="axis-label" x="${W - padR + 8}" y="${y + 3}" text-anchor="start">${fmtRight(rightVal)}</text>`;
          }
        } else {
          for (let i = 0; i <= 4; i++) {
            const y = padT + (plotH / 4) * i;
            const leftVal = leftMax - (leftRange / 4) * i;
            grid += `<line class="grid-line" x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}"></line>`;
            leftAxis += `<text class="axis-label" x="${padL - 8}" y="${y + 3}" text-anchor="end">${fmtLeft(leftVal)}</text>`;
            rightAxis += `<text class="axis-label" x="${W - padR + 8}" y="${y + 3}" text-anchor="start">${fmtRight(rightMax - (rightMax / 4) * i)}</text>`;
          }
        }

        const drawLine = (series, yFn) => {
          let polylines = "",
            dots = "";
          const pts = series.data
            .map((v, i) => `${xPos(i)},${yFn(v)}`)
            .join(" ");
          polylines += `<polyline fill="none" stroke="${series.color}" stroke-width="2" points="${pts}"></polyline>`;
          series.data.forEach((v, i) => {
            dots += `<circle cx="${xPos(i)}" cy="${yFn(v)}" r="${dotR}" fill="#fff" stroke="${series.color}" stroke-width="1.5"></circle>`;
          });
          return polylines + dots;
        };

        let xLabels = "";
        labels.forEach((lab, i) => {
          if (i % 5 === 0 || i === n - 1) {
            xLabels += `<text class="axis-label" x="${xPos(i)}" y="${H - 8}" text-anchor="middle">${lab}</text>`;
          }
        });

        const legend = [leftSeries, rightSeries]
          .map(
            (s) =>
              `<span><i style="background:${s.color}"></i>${s.name}</span>`,
          )
          .join("");

        return `
        <div class="combo-chart">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
            ${grid}
            ${drawLine(leftSeries, yLeft)}
            ${drawLine(rightSeries, yRight)}
            ${leftAxis}
            ${rightAxis}
            ${xLabels}
          </svg>
        </div>
        <div class="line-legend">${legend}</div>`;
      }

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function formatDateYMD(d) {
        return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
      }

      function parseYMD(str) {
        const [y, m, d] = str.split("-").map(Number);
        return new Date(y, m - 1, d);
      }

      function eachDateInclusive(startStr, endStr) {
        const dates = [];
        const cur = parseYMD(startStr);
        const end = parseYMD(endStr);
        while (cur <= end) {
          dates.push(formatDateYMD(cur));
          cur.setDate(cur.getDate() + 1);
        }
        return dates;
      }

      function isToday(dateStr) {
        return dateStr === formatDateYMD(new Date());
      }

      /** 5 分钟粒度的数据点（分钟数 0~1435） */
      function generateRtSeries(metric, dateStr) {
        const points = [];
        const isTd = isToday(dateStr);
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        // 当天数据画到当前分钟（对齐 5 分钟）；历史日画满全天
        const endMin = isTd ? Math.floor(nowMin / 5) * 5 : 23 * 60 + 55;
        const seed = [...(metric + dateStr)].reduce(
          (a, c) => a + c.charCodeAt(0),
          0,
        );
        let val = 1200 + (seed % 700);
        for (let m = 0; m <= endMin; m += 5) {
          const hour = Math.floor(m / 60);
          // 模拟夜间低谷、白天回升
          const nightFactor =
            hour >= 2 && hour < 6 ? 0.35 : hour >= 6 && hour < 9 ? 0.7 : 1;
          const wave =
            Math.sin((m + seed) / 90) * 180 +
            Math.cos((m + seed * 2) / 140) * 90;
          val = Math.max(
            40,
            Math.min(2480, val * 0.86 + (900 + wave) * nightFactor * 0.14),
          );
          points.push({ minute: m, value: Math.round(val) });
        }
        return points;
      }

      /** 取最靠近当前分钟的 step 分钟刻度 */
      function nearestStepMinute(nowMin, step) {
        return Math.round(nowMin / step) * step;
      }

      function getXTicks(dates) {
        const hasToday = dates.some(isToday);
        if (hasToday && dates.length === 1) {
          // 当天：默认 20 分钟一刻度；刻度过多（超过 X 轴可容纳数量）则改为 50 分钟
          const now = new Date();
          const nowMin = now.getHours() * 60 + now.getMinutes();
          const MAX_TICKS = 24; // X 轴可容纳的大致刻度上限

          let step = 20;
          let endTick = nearestStepMinute(nowMin, step);
          endTick = Math.max(0, Math.min(endTick, 23 * 60 + 40));
          let tickCount = Math.floor(endTick / step) + 1;
          if (tickCount > MAX_TICKS) {
            step = 50;
            endTick = nearestStepMinute(nowMin, step);
            endTick = Math.max(0, Math.min(endTick, 23 * 60 + 20));
          }

          const ticks = [];
          for (let m = 0; m <= endTick; m += step) ticks.push(m);
          if (!ticks.length) ticks.push(0);
          const maxMin = Math.max(endTick, step);
          return { ticks, maxMin, stepLabel: step };
        }
        // 非当天或跨天：00:00 起，50 分钟一刻度，到 23:20
        const ticks = [];
        for (let m = 0; m <= 23 * 60 + 20; m += 50) ticks.push(m);
        return { ticks, maxMin: 23 * 60 + 20, stepLabel: 50 };
      }

      function getSelectedRtMetrics() {
        const dropdown = document.getElementById("rtMetricDropdown");
        if (!dropdown) return [];
        return [...dropdown.querySelectorAll("input:checked")].map(
          (el) => el.value,
        );
      }

      function updateRtMetricTags() {
        const trigger = document.getElementById("rtMetricTrigger");
        if (!trigger) return;
        const selected = getSelectedRtMetrics();
        if (!selected.length) {
          trigger.innerHTML =
            '<span class="ms-placeholder">请选择数据源</span>';
          return;
        }
        trigger.innerHTML = selected
          .map(
            (name) =>
              `<span class="ms-tag" data-value="${name}">${name}<button type="button" aria-label="移除">×</button></span>`,
          )
          .join("");
      }

      function buildRtSeriesList(metrics, dates) {
        const series = [];
        let colorIdx = 0;
        metrics.forEach((metric) => {
          dates.forEach((date) => {
            series.push({
              metric,
              date,
              label: `${date} ${metric.replace(/^实时/, "")}`,
              color: RT_COLORS[colorIdx % RT_COLORS.length],
              points: generateRtSeries(metric, date),
            });
            colorIdx += 1;
          });
        });
        return series;
      }

      function drawRealtimeChart() {
        const svg = document.getElementById("rtChartSvg");
        const legend = document.getElementById("rtLegend");
        const wrap = document.getElementById("rtChartWrap");
        if (!svg || !legend || !wrap) return;

        const start = document.getElementById("rtStartDate")?.value;
        const end = document.getElementById("rtEndDate")?.value;
        const metrics = getSelectedRtMetrics();
        if (!start || !end || !metrics.length) {
          svg.innerHTML = "";
          legend.innerHTML =
            '<span style="color:var(--arco-text-3)">请选择数据源与日期后查询</span>';
          return;
        }

        const dates = eachDateInclusive(start, end);
        const seriesList = buildRtSeriesList(metrics, dates);
        const { ticks, maxMin } = getXTicks(dates);

        const W = 960,
          H = 300;
        const padL = 52,
          padR = 16,
          padT = 16,
          padB = 36;
        const plotW = W - padL - padR;
        const plotH = H - padT - padB;
        const yMax = 2500;
        const yTicks = [0, 500, 1000, 1500, 2000, 2500];
        const xPos = (m) => padL + (m / maxMin) * plotW;
        const yPos = (v) => padT + plotH * (1 - v / yMax);

        let html = "";
        yTicks.forEach((v) => {
          const y = yPos(v);
          html += `<line class="rt-grid" x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}"></line>`;
          html += `<text class="rt-axis" x="${padL - 8}" y="${y + 4}" text-anchor="end">${v.toLocaleString("zh-CN")}</text>`;
        });
        ticks.forEach((m) => {
          html += `<text class="rt-axis" x="${xPos(m)}" y="${H - 10}" text-anchor="middle">${minuteToLabel(m)}</text>`;
        });

        seriesList.forEach((s) => {
          const pts = s.points
            .map((p) => `${xPos(Math.min(p.minute, maxMin))},${yPos(p.value)}`)
            .join(" ");
          html += `<polyline fill="none" stroke="${s.color}" stroke-width="2" points="${pts}"></polyline>`;
        });

        html += `<line class="rt-crosshair" id="rtCrosshair" x1="0" y1="${padT}" x2="0" y2="${padT + plotH}" visibility="hidden"></line>`;
        html += `<g id="rtHoverDots"></g>`;
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        svg.innerHTML = html;

        legend.innerHTML = seriesList
          .map(
            (s) =>
              `<span><i style="background:${s.color}"></i>${s.date} ${s.metric}</span>`,
          )
          .join("");

        // 缓存供 hover 使用
        wrap._rtState = {
          seriesList,
          maxMin,
          padL,
          padR,
          padT,
          plotW,
          plotH,
          yMax,
          W,
          H,
        };
      }

      function initRealtimeChart() {
        const panel = document.getElementById("realtimePanel");
        if (!panel) return;

        if (window._rtAbort) window._rtAbort.abort();
        window._rtAbort = new AbortController();
        const { signal } = window._rtAbort;

        const trigger = document.getElementById("rtMetricTrigger");
        const dropdown = document.getElementById("rtMetricDropdown");
        const wrap = document.getElementById("rtChartWrap");
        const tooltip = document.getElementById("rtTooltip");
        const svg = document.getElementById("rtChartSvg");

        const msWrap = document.getElementById("rtMetricSelect");

        const closeMetricDropdown = (shouldRefresh = true) => {
          dropdown?.classList.remove("open");
          trigger?.classList.remove("open");
          if (shouldRefresh) drawRealtimeChart();
        };

        const clearRealtimeSelection = () => {
          dropdown?.querySelectorAll('input[type="checkbox"]').forEach((el) => {
            el.checked = false;
          });
          closeMetricDropdown();
          updateRtMetricTags();
          drawRealtimeChart();
        };

        updateRtMetricTags();
        drawRealtimeChart();

        trigger?.addEventListener(
          "click",
          (e) => {
            if (e.target.closest(".ms-tag button")) return;
            e.stopPropagation();
            const open = dropdown.classList.toggle("open");
            trigger.classList.toggle("open", open);
            if (!open) drawRealtimeChart();
          },
          { signal },
        );

        trigger?.addEventListener(
          "click",
          (e) => {
            const btn = e.target.closest(".ms-tag button");
            if (!btn) return;
            e.stopPropagation();
            const tag = btn.closest(".ms-tag");
            const val = tag?.dataset.value;
            const input = dropdown.querySelector(`input[value="${val}"]`);
            if (input) input.checked = false;
            updateRtMetricTags();
            drawRealtimeChart();
          },
          { signal },
        );

        dropdown?.addEventListener("click", (e) => e.stopPropagation(), {
          signal,
        });
        dropdown?.addEventListener(
          "change",
          () => {
            updateRtMetricTags();
            drawRealtimeChart();
          },
          { signal },
        );

        // 点击多选框以外的空白区域收起下拉
        document.addEventListener(
          "click",
          (e) => {
            if (!msWrap?.contains(e.target)) closeMetricDropdown();
          },
          { signal },
        );

        document
          .getElementById("rtQueryBtn")
          ?.addEventListener("click", drawRealtimeChart, { signal });
        document.getElementById("rtRefreshBtn")?.addEventListener(
          "click",
          (e) => {
            e.stopPropagation();
            clearRealtimeSelection();
          },
          { signal },
        );

        wrap?.addEventListener(
          "mousemove",
          (e) => {
            const state = wrap._rtState;
            if (!state || !state.seriesList.length) return;
            const rect = svg.getBoundingClientRect();
            const scaleX = state.W / rect.width;
            const mx = (e.clientX - rect.left) * scaleX;
            if (mx < state.padL || mx > state.W - state.padR) {
              tooltip.style.display = "none";
              document
                .getElementById("rtCrosshair")
                ?.setAttribute("visibility", "hidden");
              document.getElementById("rtHoverDots").innerHTML = "";
              return;
            }
            const minuteRaw = ((mx - state.padL) / state.plotW) * state.maxMin;
            const minute = Math.round(minuteRaw / 5) * 5;
            const clamped = Math.max(0, Math.min(state.maxMin, minute));
            const x = state.padL + (clamped / state.maxMin) * state.plotW;

            const cross = document.getElementById("rtCrosshair");
            if (cross) {
              cross.setAttribute("x1", x);
              cross.setAttribute("x2", x);
              cross.setAttribute("visibility", "visible");
            }

            const yPos = (v) => state.padT + state.plotH * (1 - v / state.yMax);
            let dots = "";
            const rows = state.seriesList
              .map((s) => {
                if (!s.points.length) return null;
                const pt =
                  s.points.find((p) => p.minute === clamped) ||
                  s.points.reduce(
                    (best, p) =>
                      Math.abs(p.minute - clamped) <
                      Math.abs(best.minute - clamped)
                        ? p
                        : best,
                    s.points[0],
                  );
                if (!pt || Math.abs(pt.minute - clamped) > 5) return null;
                dots += `<circle cx="${x}" cy="${yPos(pt.value)}" r="4" fill="#fff" stroke="${s.color}" stroke-width="2"></circle>`;
                return `<div class="rt-tip-row"><span class="rt-tip-dot" style="background:${s.color}"></span>${s.date} ${s.metric}: ${pt.value.toLocaleString("zh-CN")}</div>`;
              })
              .filter(Boolean);

            document.getElementById("rtHoverDots").innerHTML = dots;
            if (!rows.length) {
              tooltip.style.display = "none";
              return;
            }
            tooltip.innerHTML = `<div class="rt-tip-time">${minuteToLabel(clamped)}</div>${rows.join("")}`;
            tooltip.style.display = "block";
            const tipX = (x / state.W) * rect.width;
            tooltip.style.left = `${tipX}px`;
            tooltip.style.top = `${(state.padT / state.H) * rect.height + 20}px`;
          },
          { signal },
        );

        wrap?.addEventListener(
          "mouseleave",
          () => {
            tooltip.style.display = "none";
            document
              .getElementById("rtCrosshair")
              ?.setAttribute("visibility", "hidden");
            const dots = document.getElementById("rtHoverDots");
            if (dots) dots.innerHTML = "";
          },
          { signal },
        );
      }

      function initSurplusRateChart() {
        const toggle = document.getElementById("surplusRateRangeToggle");
        const wrap = document.getElementById("surplusRateChartWrap");
        const subtitle = document.getElementById("surplusRateSubtitle");
        if (!toggle || !wrap) return;

          7: "近七日盈余率走势",

          wrap.innerHTML = renderSurplusRateTrend(dayCount);
          if (subtitle) subtitle.textContent = subtitleMap[dayCount] || subtitleMap[7];
        };

        toggle.querySelectorAll(".range-btn").forEach((btn) => {
          btn.addEventListener(
            "click",
            () => {
              toggle
                .querySelectorAll(".range-btn")
                .forEach((b) => b.classList.remove("active"));
              btn.classList.add("active");
              updateChart(Number(btn.dataset.days));
            },
            { signal },
          );
        });
      }

      function renderKpiCard(k) {
        const dir =
          k.dir === "down" ? "down" : k.dir === "flat" ? "flat" : "up";
        const arrow = dir === "down" ? "↓" : dir === "flat" ? "→" : "↑";
        const tag = k.tag
          ? ` <span class="status-tag ${k.tagType || "info"}">${k.tag}</span>`
          : "";
        const trend = k.trend
          ? `<div class="metric-trend ${dir === "flat" ? "" : dir}">${arrow} ${k.trend}</div>`
          : "";
        return `<article class="metric-card"><div class="metric-label">${k.label}${tag}</div><div class="metric-value">${k.value}</div>${trend}</article>`;
      }

        if (!page.insights || !page.insights.length) return "";

        const heading = page.question
          ? `<div class="section-heading">${page.title} <span class="hint">${page.question}</span></div>`
          : "";

        <div class="analysis-block">
          ${heading}
          <section class="kpi-grid" style="grid-template-columns:repeat(${cols},minmax(0,1fr))" aria-label="${page.title}核心指标">
            ${page.insights.map(renderKpiCard).join("")}
          </section>
        </div>`;
      }

                <polyline fill="none" stroke="#F7BA1E" stroke-width="2.5" points="0,100 50,94 100,90 150,82 200,76 250,68 300,60 350,52 400,46"/>
                <polyline fill="none" stroke="#165DFF" stroke-width="2.5" points="0,90 50,82 100,76 150,66 200,58 250,50 300,42 350,34 400,28"/>

                <polyline fill="none" stroke="#722ED1" stroke-width="2.5" points="0,60 50,58 100,55 150,52 200,50 250,47 300,45 350,42 400,40"/>
              </svg></div>
              <div class="line-legend"><span><i style="background:#00B42A"></i>总ARPU</span><span><i style="background:#722ED1"></i>总ARPPU</span></div>
            </article>

              <div class="chart-title">留存趋势 <span class="status-tag info">折线图</span></div>
              <div class="chart-subtitle">次日留存 / 7日留存</div>

                <polyline fill="none" stroke="#165DFF" stroke-width="2.5" points="0,55 50,53 100,51 150,49 200,47 250,46 300,44 350,42 400,40"/>
                <polyline fill="none" stroke="#F53F3F" stroke-width="2.5" points="0,95 50,94 100,92 150,90 200,89 250,88 300,86 350,85 400,84"/>
              </svg></div>

      function renderAnalysisPanel(page) {
        if (!page) return "";
        if (page.trendCharts) return renderLifecycleTrendInsights(page);
        return renderInsightsPanel(page);
      }

      function renderPage(pageId) {
        const page = PAGES[pageId];
        if (!page) return;

        const container = document.getElementById("pageContainer");
        container.innerHTML = `
          ${pageId === "overview" ? renderOverviewInsights() : ""}
          ${page.overviewFunnelChart ? renderOverviewFunnelChart() : ""}
          ${renderAnalysisPanel(page)}
          ${page.chartView ? renderAcquisitionFixedCharts() : ""}
          ${page.activationCharts ? renderActivationFixedCharts() : ""}
          ${page.retentionActiveCharts ? renderRetentionActiveCharts() : ""}
          ${page.conversionCharts ? renderConversionRateTrendChart() : ""}
          ${page.valueOverallCharts ? renderOverallValueTrendCharts() : ""}
          ${page.valueOldCharts ? renderOldUserValueTrendCharts() : ""}
        <div class="page-panel active" id="panel-${pageId}">
          ${renderTable(page)}
        </div>
      `;

        document.getElementById("breadcrumbTitle").textContent =
          page.breadcrumb;
        initFilterBar();
        initViewToggle();
        if (pageId === "overview") {
          initRealtimeChart();
          initSurplusRateChart();
        }
      }

      function initViewToggle() {
        const toggle = document.querySelector(".view-toggle");
        if (!toggle) return;
        const tableView = document.getElementById("tableView");
        const chartView = document.getElementById("chartView");
        toggle.querySelectorAll(".vt-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            toggle
              .querySelectorAll(".vt-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            const isChart = btn.dataset.view === "chart";
            if (chartView) chartView.hidden = !isChart;
            if (tableView) tableView.hidden = isChart;
          });
        });
      }

      function clearMenuActive() {
        document
          .querySelectorAll(".menu-top, .menu-child, .menu-grandchild")
          .forEach((el) => el.classList.remove("active"));
      }

      function setActivePage(pageId, options = {}) {
        const { topEl, childEl, grandchildEl, group, subGroup } = options;
        clearMenuActive();
        if (grandchildEl) {
          grandchildEl.classList.add("active");
          subGroup
            ?.querySelector(".menu-child.has-child")
            ?.classList.add("active");
          group?.querySelector(".menu-top")?.classList.add("active");
        } else if (childEl) {
          childEl.classList.add("active");
          group?.querySelector(".menu-top")?.classList.add("active");
        } else if (topEl) {
          topEl.classList.add("active");
        }
        renderPage(pageId);
      }

      function initMenu() {
        // 一级菜单（无子项）：经营总览、盈利分析
        document.querySelectorAll(".menu-top[data-page]").forEach((top) => {
          top.addEventListener("click", () => {
            setActivePage(top.dataset.page, { topEl: top });
          });
        });

        // 一级菜单（有子项）：点击展开/收起
        document.querySelectorAll(".menu-group").forEach((group) => {
          const top = group.querySelector(".menu-top.has-child");
          if (!top) return;

          top.addEventListener("click", () => {
            const isExpanded = group.classList.contains("expanded");
            if (isExpanded) {
              group.classList.remove("expanded");
              return;
            }
            group.classList.add("expanded");
            // 优先打开第一个可展开二级菜单的首个子页
            const firstSub = group.querySelector(".menu-sub-group");
            if (firstSub) {
              firstSub.classList.add("expanded");
              const firstGrandchild =
                firstSub.querySelector(".menu-grandchild");
              if (firstGrandchild) {
                setActivePage(firstGrandchild.dataset.page, {
                  grandchildEl: firstGrandchild,
                  subGroup: firstSub,
                  group,
                });
                return;
              }
            }
            const firstChild = group.querySelector(".menu-child[data-page]");
            if (firstChild) {
              setActivePage(firstChild.dataset.page, {
                childEl: firstChild,
                group,
              });
            }
          });
        });

        // 二级菜单（可展开：用户生命周期）
        document.querySelectorAll(".menu-sub-group").forEach((subGroup) => {
          const child = subGroup.querySelector(".menu-child.has-child");
          if (!child) return;

          child.addEventListener("click", (e) => {
            e.stopPropagation();
            const group = subGroup.closest(".menu-group");
            group.classList.add("expanded");

            const isExpanded = subGroup.classList.contains("expanded");
            if (isExpanded) {
              subGroup.classList.remove("expanded");
              return;
            }
            subGroup.classList.add("expanded");
            const firstGrandchild = subGroup.querySelector(".menu-grandchild");
            if (firstGrandchild) {
              setActivePage(firstGrandchild.dataset.page, {
                grandchildEl: firstGrandchild,
                subGroup,
                group,
              });
            }
          });
        });

        // 三级菜单
        document.querySelectorAll(".menu-grandchild").forEach((grandchild) => {
          grandchild.addEventListener("click", (e) => {
            e.stopPropagation();
            const subGroup = grandchild.closest(".menu-sub-group");
            const group = grandchild.closest(".menu-group");
            group.classList.add("expanded");
            subGroup.classList.add("expanded");
            setActivePage(grandchild.dataset.page, {
              grandchildEl: grandchild,
              subGroup,
              group,
            });
          });
        });

        // 二级菜单（直接跳转）
        document.querySelectorAll(".menu-child[data-page]").forEach((child) => {
          child.addEventListener("click", (e) => {
            e.stopPropagation();
            const group = child.closest(".menu-group");
            group.classList.add("expanded");
            setActivePage(child.dataset.page, { childEl: child, group });
          });
        });
      }

      // 初始化
      initMenu();
      renderPage("overview");
    </script>
